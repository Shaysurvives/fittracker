    // ============ COMPLETION SCREEN with FIRE ANIMATION ============
    function CompletionScreen({ summary, profile, dayName, duration, onDone }) {
      const { burn, totalSets, completedSets, totalVol, finisher } = summary;

      // Trigger haptic + sound on mount
      useEffect(() => {
        if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 200]);
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          // Quick triumphant 3-note arpeggio
          [523, 659, 784].forEach((freq, i) => {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.frequency.value = freq;
            const start = ctx.currentTime + i * 0.12;
            g.gain.setValueAtTime(0.18, start);
            g.gain.exponentialRampToValueAtTime(0.01, start + 0.3);
            o.start(start); o.stop(start + 0.3);
          });
        } catch (e) { /* silent */ }
      }, []);

      // Calorie context vs daily target
      const totalLoss = profile?.startWeight && profile?.goalWeight
        ? Math.max(0.5, profile.startWeight - profile.goalWeight) : 5;
      const dailyDeficit = profile?.durationDays
        ? Math.round((totalLoss * 7700) / profile.durationDays) : 500;
      const fatGramsBurned = ((burn / 7700) * 1000).toFixed(0);

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-sm p-4">
          {/* Fire particles — pure CSS, no dependencies */}
          <FireAnimation />

          <div className="relative w-full max-w-md">
            {/* Hero */}
            <div className="text-center mb-6 relative z-10">
              {/* Big flame icon */}
              <div className="relative inline-block mb-4">
                <div className="absolute inset-0 blur-2xl opacity-70" style={{ background: "radial-gradient(circle, #f97316, #ef4444 40%, transparent 70%)" }} />
                <div className="relative w-24 h-24 mx-auto flex items-center justify-center">
                  <svg viewBox="0 0 100 100" className="w-24 h-24" style={{ filter: "drop-shadow(0 0 20px rgba(249,115,22,0.6))" }}>
                    <defs>
                      <linearGradient id="flameGrad" x1="0" y1="100%" x2="0" y2="0">
                        <stop offset="0%" stopColor="#fbbf24" />
                        <stop offset="40%" stopColor="#f97316" />
                        <stop offset="100%" stopColor="#dc2626" />
                      </linearGradient>
                    </defs>
                    <path d="M50 90 C 25 90, 18 65, 30 45 C 30 60, 38 60, 38 50 C 38 30, 50 20, 45 5 C 60 15, 75 35, 70 55 C 70 45, 62 50, 62 60 C 70 50, 82 65, 78 80 C 75 90, 62 90, 50 90 Z"
                      fill="url(#flameGrad)" className="flame-flicker" />
                  </svg>
                </div>
              </div>

              <div className="text-zinc-500 text-xs uppercase tracking-widest font-bold mb-1">Workout Complete</div>
              <h1 className="text-3xl font-bold text-zinc-100">You crushed it.</h1>
              <p className="text-zinc-400 text-sm mt-1">{dayName} day · {duration} min</p>
            </div>

            {/* Big burn number */}
            <div className="bg-gradient-to-br from-orange-500/20 via-zinc-900 to-zinc-900 border border-orange-500/30 rounded-3xl p-6 mb-4 relative overflow-hidden">
              <div className="absolute -right-16 -top-16 w-48 h-48 rounded-full opacity-30 blur-3xl bg-orange-500 flame-pulse" />
              <div className="relative z-10 text-center">
                <div className="text-orange-400 text-[10px] uppercase tracking-widest font-bold mb-1">Calories burned</div>
                <div className="flex items-baseline justify-center gap-2 mt-1">
                  <span className="text-6xl font-bold mono" style={{ background: "linear-gradient(180deg, #fbbf24, #f97316)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
                    {burn}
                  </span>
                  <span className="text-zinc-400 font-semibold">kcal</span>
                </div>
                <div className="text-xs text-zinc-500 mt-2">≈ <span className="text-orange-300 font-semibold">{fatGramsBurned}g of fat</span> · {Math.round((burn / dailyDeficit) * 100)}% of today's deficit goal</div>
              </div>
            </div>

            {/* Stats grid */}
            <div className="grid grid-cols-3 gap-2 mb-4">
              <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-center">
                <div className="text-[9px] text-zinc-500 uppercase tracking-wider font-semibold">Sets</div>
                <div className="text-lg font-bold text-zinc-100 mono">{totalSets}</div>
                {completedSets > 0 && completedSets < totalSets && (
                  <div className="text-[9px] text-lime-400 mono">{completedSets} ✓</div>
                )}
              </div>
              <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-center">
                <div className="text-[9px] text-zinc-500 uppercase tracking-wider font-semibold">Volume</div>
                <div className="text-lg font-bold text-zinc-100 mono">{Math.round(totalVol)}<span className="text-[9px] text-zinc-500"> kg</span></div>
              </div>
              <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-center">
                <div className="text-[9px] text-zinc-500 uppercase tracking-wider font-semibold">Time</div>
                <div className="text-lg font-bold text-zinc-100 mono">{duration}<span className="text-[9px] text-zinc-500"> min</span></div>
              </div>
            </div>

            {/* Finisher line if used */}
            {finisher && (
              <div className="bg-zinc-900 border border-orange-500/30 rounded-xl p-3 mb-4 flex items-center gap-3">
                <Flame className="w-4 h-4 text-orange-400 shrink-0" />
                <div className="flex-1 min-w-0">
                  <div className="text-[10px] text-orange-400 uppercase tracking-wider font-bold">Finisher completed</div>
                  <div className="text-xs text-zinc-300 truncate">{finisher.name} · +{finisher.kcal} kcal</div>

            {/* Motivational tagline */}

              <p className="text-zinc-500 text-xs italic">
                {burn > 350 ? "That's serious work. Your goal just got closer." :
                 burn > 250 ? "Solid session. Consistency wins this game." :
                 "Every session counts. Show up tomorrow."}
              </p>
            </div>

            {/* Done button */}
            <button onClick={onDone}
              className="w-full py-4 rounded-2xl font-bold text-zinc-900 flex items-center justify-center gap-2"
              style={{ background: ACCENT, boxShadow: "0 0 30px rgba(163,230,53,0.3)" }}>
              <Check className="w-4 h-4" strokeWidth={3} /> Save & finish
            </button>
          </div>

          {/* Fire animation styles */}
          <style>{`
            @keyframes flicker {
              0%, 100% { transform: scaleY(1) translateY(0); opacity: 1; }
              25%      { transform: scaleY(1.05) translateY(-2px); opacity: 0.95; }
              50%      { transform: scaleY(0.97) translateY(1px); opacity: 1; }
              75%      { transform: scaleY(1.03) translateY(-1px); opacity: 0.97; }
            }
            .flame-flicker { animation: flicker 0.4s ease-in-out infinite; transform-origin: center bottom; }
            @keyframes pulse-glow {
              0%, 100% { opacity: 0.3; transform: scale(1); }
              50%      { opacity: 0.5; transform: scale(1.1); }
            }
            .flame-pulse { animation: pulse-glow 2s ease-in-out infinite; }
            @keyframes spark-rise {
              0%   { transform: translateY(0) scale(0.4); opacity: 0; }
              15%  { opacity: 1; }
              85%  { opacity: 1; }
              100% { transform: translateY(-100vh) scale(1); opacity: 0; }
            }
            .spark { position: absolute; bottom: 0; border-radius: 50%; pointer-events: none; animation: spark-rise linear infinite; }
          `}</style>
        </div>
      );
    }

    // Pure-CSS particle fire animation — no canvas, no dependencies, smooth on phones.
    // Spawns ~25 sparks at random positions, sizes, durations, and warm colors.
    function FireAnimation() {
      const sparks = useMemo(() => {
        const colors = ["#fbbf24", "#f97316", "#ef4444", "#dc2626", "#fde047"];
        return Array.from({ length: 28 }, (_, i) => ({
          id: i,
          left: Math.random() * 100,
          size: 3 + Math.random() * 6,
          duration: 2 + Math.random() * 3,
          delay: Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          blur: Math.random() > 0.5,
        }));
      }, []);

      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
          {sparks.map((s) => (
            <div key={s.id} className="spark"
              style={{
                left: `${s.left}%`,
                width: `${s.size}px`,
                height: `${s.size}px`,
                background: s.color,
                boxShadow: `0 0 ${s.size * 2}px ${s.color}`,
                filter: s.blur ? `blur(${s.size / 4}px)` : "none",
                animationDuration: `${s.duration}s`,
                animationDelay: `${s.delay}s`,
                opacity: 0,
              }} />
          ))}
        </div>
      );
    }

    // ============ NUTRITION SCREEN ============
    function NutritionScreen({ profile, meals, setMeals, workouts, customFoods = [], setCustomFoods, mealPresets = [], setMealPresets, desktop = false }) {
      const today = todayKey();
      const [activeMeal, setActiveMeal] = useState(null); // "Breakfast", etc
      const [searchQ, setSearchQ] = useState("");
      const [activeCat, setActiveCat] = useState("All");
      const [showCustomForm, setShowCustomForm] = useState(false);
      const [customFood, setCustomFood] = useState({ name: "", cal: "", p: "", c: "", f: "" });
      const [presetMenuFor, setPresetMenuFor] = useState(null); // meal name for preset picker
      const [savingPreset, setSavingPreset] = useState(null); // { meal, foods } when prompting for name
      const [presetName, setPresetName] = useState("");

      // Adherence-aware target
      const last14 = workouts.filter(w => {
        const diff = (Date.now() - new Date(w.date).getTime()) / 86400000;
        return diff <= 14;
      });
      const consistent = last14.length >= 7;
      const tdee = calcTDEE(profile, consistent);
      const totalLoss = profile.startWeight - profile.goalWeight;
      const dailyDeficit = Math.round((totalLoss * KCAL_PER_KG_FAT) / profile.durationDays);
      const calorieTarget = Math.max(1200, tdee - dailyDeficit);
      const proteinTarget = Math.round(profile.weight * 1.8);

      const mealTypes = ["Breakfast", "Lunch", "Dinner", "Snack"];
      const todayMeals = meals.filter(m => m.date === today);

      // Combined food pool (built-in + user-added custom foods)
      const allFoods = useMemo(() => {
        const customs = (customFoods || []).map((f) => ({ ...f, cat: "My Foods" }));
        return [...customs, ...FOOD_DB];
      }, [customFoods]);

      // Build the list of category tabs from whatever is in allFoods
      const categories = useMemo(() => {
        const set = new Set(allFoods.map((f) => f.cat));
        const arr = Array.from(set);
        // My Foods first, then alphabetical
        arr.sort((a, b) => (a === "My Foods" ? -1 : b === "My Foods" ? 1 : a.localeCompare(b)));
        return ["All", ...arr];
      }, [allFoods]);

      const totals = todayMeals.reduce((acc, m) => {
        m.foods.forEach(f => {
          acc.cal += f.cal * f.qty;
          acc.p += f.p * f.qty;
          acc.c += (f.c || 0) * f.qty;
          acc.f += (f.f || 0) * f.qty;

        return acc;
      }, { cal: 0, p: 0, c: 0, f: 0 });

      const addFood = (food) => {
        const existing = todayMeals.find(m => m.meal === activeMeal);
        let updated;
        if (existing) {
          updated = meals.map(m =>
            m.id === existing.id ? { ...m, foods: [...m.foods, { ...food, qty: 1 }] } : m
          );
        } else {
          updated = [...meals, { id: Date.now(), date: today, meal: activeMeal, foods: [{ ...food, qty: 1 }] }];
        }
        setMeals(updated);
        setSearchQ("");

      const updateQty = (mealId, foodIdx, delta) => {
        const updated = meals.map(m => {
          if (m.id !== mealId) return m;
          const newFoods = [...m.foods];
          const newQty = +(newFoods[foodIdx].qty + delta).toFixed(1);
          if (newQty <= 0) newFoods.splice(foodIdx, 1);
          else newFoods[foodIdx] = { ...newFoods[foodIdx], qty: newQty };
          return { ...m, foods: newFoods };
        }).filter(m => m.foods.length > 0);
        setMeals(updated);

      const saveCustomFood = () => {

          name,
          cal,
          p: +customFood.p || 0,
          c: +customFood.c || 0,
          f: +customFood.f || 0,
          cat: "My Foods",
          custom: true,
        };
        setCustomFoods([food, ...(customFoods || [])]);
        setCustomFood({ name: "", cal: "", p: "", c: "", f: "" });
        setShowCustomForm(false);
        addFood(food); // also add it to current meal

      const deleteCustomFood = (name) => {
        setCustomFoods((customFoods || []).filter((f) => f.name !== name));

                          setPresetMenuFor(null);

                          className="w-full p-3 text-left flex items-center justify-between">

          {activeMeal && (

              {/* Search bar */}

                <input
                  autoFocus
                  value={searchQ}
                  onChange={(e) => setSearchQ(e.target.value)}
                  placeholder="Search any food..."
                  className="w-full bg-zinc-800 border border-zinc-700 rounded-xl pl-4 pr-10 py-3 text-zinc-100 placeholder-zinc-500 focus:border-lime-500 outline-none"
                />
                {searchQ && (
                  <button onClick={() => setSearchQ("")}
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300">
                    <X className="w-4 h-4" />
                  </button>

              {/* Category tabs (horizontal scroll) */}
              <div className="flex gap-1.5 overflow-x-auto scrollbar-hide -mx-1 px-1 pb-2 mb-2">
                {categories.map((cat) => (
                  <button key={cat} onClick={() => setActiveCat(cat)}
                    className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap border transition ${
                      activeCat === cat
                        ? "bg-lime-400 text-zinc-900 border-lime-400"
                        : "bg-zinc-800 text-zinc-400 border-zinc-700 hover:border-zinc-600"
                    }`}>
                    {cat === "My Foods" && "⭐ "}{cat}

              <div className="flex items-center justify-between mb-2 px-1">
                <div className="text-[10px] text-zinc-600 uppercase tracking-wider font-semibold">
                  {filteredFoods.length} {filteredFoods.length === 1 ? "food" : "foods"}

                  <Plus className="w-3 h-3" /> Custom

    const MacroDot = ({ label, val, target, color, unit }) => {
      const pct = Math.min(100, (val / target) * 100);
      return (
        <div>
          <div className="flex justify-between items-baseline">
            <span className="text-xs text-zinc-500 font-semibold">{label}</span>

    // ============ PROGRESS SCREEN ============
    function ProgressScreen({ profile, weights, workouts, meals, desktop = false }) {
      const last14 = workouts.filter(w => (Date.now() - new Date(w.date).getTime()) / 86400000 <= 14);
      const consistent = last14.length >= 7;
      const tdee = calcTDEE(profile, consistent);
      const totalLoss = profile.startWeight - profile.goalWeight;
      const dailyDeficitTarget = Math.round((totalLoss * KCAL_PER_KG_FAT) / profile.durationDays);

      // Build chart data: predicted vs actual
      const chartData = useMemo(() => {
        const days = profile.durationDays;
        const data = [];
        const startTime = new Date(profile.startDate).getTime();

        for (let i = 0; i <= days; i += Math.max(1, Math.floor(days / 60))) {
          const date = new Date(startTime + i * 86400000).toISOString().slice(0, 10);
          const predicted = +(profile.startWeight - (totalLoss * i) / days).toFixed(2);

          const actualEntry = weights.find(w => w.date === date);
          const closestActual = actualEntry?.weight ?? null;

          data.push({
            date,
            day: i,
            predicted,
            actual: closestActual,
            label: i === 0 ? "Start" : i === days ? "Goal" : ""
          });
        }
        return data;
      }, [profile, weights, totalLoss]);

      const currentWeight = weights.length ? weights[weights.length - 1].weight : profile.startWeight;
      const lostSoFar = profile.startWeight - currentWeight;

      // Daily calorie average over last 7 days
      const last7Cal = useMemo(() => {
        const data = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
          const dayMeals = meals.filter(m => m.date === d);
          const cal = dayMeals.reduce((s, m) => s + m.foods.reduce((sf, f) => sf + f.cal * f.qty, 0), 0);
          data.push({ date: fmtDate(d), cal: Math.round(cal) });
        }
        return data;
      }, [meals]);

      const avgCal = Math.round(last7Cal.reduce((s, d) => s + d.cal, 0) / 7);
      const expectedDailyDeficit = consistent ? dailyDeficitTarget * 1.1 : dailyDeficitTarget * 0.9;
      const expectedWeeklyLoss = (expectedDailyDeficit * 7) / KCAL_PER_KG_FAT;
      const expectedMonthlyLoss = (expectedDailyDeficit * 30) / KCAL_PER_KG_FAT;

      // End-of-week and end-of-month estimates
      const today = new Date();
      const dayOfWeek = today.getDay();
      const daysToEOW = 7 - dayOfWeek;
      const daysToEOM = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate() - today.getDate();
      const eowWeight = +(currentWeight - (expectedDailyDeficit * daysToEOW) / KCAL_PER_KG_FAT).toFixed(1);
      const eomWeight = +(currentWeight - (expectedDailyDeficit * daysToEOM) / KCAL_PER_KG_FAT).toFixed(1);

      return (
        <div className={desktop ? "fade-in" : "px-5 pt-5 fade-in"}>
          <h1 className="text-2xl lg:text-3xl font-bold text-zinc-100 mb-1">Progress</h1>
          <p className="text-zinc-500 text-sm mb-5">Predicted vs actual.</p>

          {/* Main chart */}
          <Card className="mb-4">
            <div className="flex justify-between items-start mb-4">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">Trajectory</div>
                <div className="text-2xl font-bold text-zinc-100 mono">{currentWeight.toFixed(1)} <span className="text-base text-zinc-500">kg</span></div>
              </div>
              <div className="text-right">
                <div className="text-zinc-500 text-xs">Lost so far</div>
                <div className="text-lg font-bold mono" style={{ color: ACCENT }}>−{lostSoFar.toFixed(1)} kg</div>
              </div>
            </div>
            <div className="h-48">
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={chartData}>
                  <defs>
                    <linearGradient id="predGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={ACCENT} stopOpacity={0.4} />
                      <stop offset="100%" stopColor={ACCENT} stopOpacity={0} />
                    </linearGradient>
                    <linearGradient id="actGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#fff" stopOpacity={0.3} />
                      <stop offset="100%" stopColor="#fff" stopOpacity={0} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="2 4" stroke="#27272a" vertical={false} />
                  <XAxis dataKey="day" tick={{ fill: "#52525b", fontSize: 10 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: "#52525b", fontSize: 10 }} axisLine={false} tickLine={false} domain={['dataMin - 1', 'dataMax + 1']} width={28} />
                  <Tooltip contentStyle={{ background: "#18181b", border: "1px solid #3f3f46", borderRadius: 8, fontSize: 12 }} labelStyle={{ color: "#a1a1aa" }} />
                  <Area type="monotone" dataKey="predicted" stroke={ACCENT} strokeWidth={2} fill="url(#predGrad)" name="Predicted" />
                  <Area type="monotone" dataKey="actual" stroke="#fff" strokeWidth={2.5} fill="url(#actGrad)" connectNulls={false} name="Actual" />
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div className="flex gap-4 text-xs mt-3 justify-center">
              <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full" style={{ background: ACCENT }} /><span className="text-zinc-400">Predicted</span></span>
              <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-white" /><span className="text-zinc-400">Actual</span></span>
            </div>
          </Card>

          {/* Predictions */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Forecasts</h2>
          <div className="grid grid-cols-2 gap-3 mb-4">
            <PredictCard label="End of week" weight={eowWeight} delta={-(currentWeight - eowWeight).toFixed(1)} />
            <PredictCard label="End of month" weight={eomWeight} delta={-(currentWeight - eomWeight).toFixed(1)} />
            <PredictCard label="Weekly pace" weight={`−${expectedWeeklyLoss.toFixed(2)} kg`} sub="this week" />
            <PredictCard label="Monthly pace" weight={`−${expectedMonthlyLoss.toFixed(1)} kg`} sub="this month" />
          </div>

          {/* Calories */}
          <Card className="mb-4">
            <div className="flex justify-between items-start mb-3">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">7-day avg intake</div>
                <div className="text-2xl font-bold text-zinc-100 mono">{avgCal} <span className="text-sm text-zinc-500">kcal</span></div>
              </div>
              <div className="text-right">
                <div className="text-xs text-zinc-500">TDEE</div>
                <div className="text-lg font-bold text-zinc-300 mono">{tdee}</div>
              </div>
            </div>
            <div className="h-28">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={last7Cal} margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                  <XAxis dataKey="date" tick={{ fill: "#52525b", fontSize: 9 }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ background: "#18181b", border: "1px solid #3f3f46", borderRadius: 8, fontSize: 12 }} cursor={{ fill: "#27272a" }} />
                  <ReferenceLine y={tdee} stroke="#fb923c" strokeDasharray="3 3" />
                  <Bar dataKey="cal" fill={ACCENT} radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </Card>

          {/* Insight */}
          <Card>
            <div className="flex items-start gap-3">
              <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0"
                style={{ background: consistent ? "rgba(163,230,53,0.15)" : "rgba(251,146,60,0.15)" }}>
                {consistent
                  ? <Trophy className="w-4 h-4" style={{ color: ACCENT }} />
                  : <Target className="w-4 h-4 text-orange-400" />}
              </div>
              <div>
                <div className="text-zinc-100 font-semibold text-sm">
                  {consistent ? "Workouts are boosting your fat loss." : "Inconsistent training — predictions adjusted down."}
                </div>
                <p className="text-xs text-zinc-500 mt-1 leading-relaxed">
                  {consistent
                    ? "Your TDEE is calculated using a moderate activity multiplier (1.55), which adds ~10% to expected weekly loss."
                    : "Without regular sessions, we use a light activity multiplier (1.375). Hit 4+ workouts a week to unlock the boost."}
                </p>
              </div>
            </div>
          </Card>
        </div>
      );
    }

    const PredictCard = ({ label, weight, delta, sub }) => (
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
        <div className="text-xs text-zinc-500 uppercase tracking-wider font-semibold">{label}</div>
        <div className="text-xl font-bold text-zinc-100 mono mt-1">{typeof weight === "number" ? `${weight} kg` : weight}</div>
        {delta !== undefined && (
          <div className="text-xs mono mt-0.5" style={{ color: ACCENT }}>{delta} kg</div>
        )}
        {sub && <div className="text-xs text-zinc-600 mt-0.5">{sub}</div>}
      </div>
    );

    // ============ PROFILE SCREEN ============
    function ProfileScreen({ profile, setProfile, measurements, setMeasurements, weights, desktop = false }) {
      const [editing, setEditing] = useState(false);
      const [showMeasure, setShowMeasure] = useState(false);
      const [newM, setNewM] = useState({ chest: 100, waist: 85, arms: 35 });

      const tdee = calcTDEE(profile);
      const bmr = Math.round(calcBMR(profile));

      const lastMeasurement = measurements[measurements.length - 1];

      const saveMeasurement = () => {
        setMeasurements([...measurements, { ...newM, date: todayKey() }]);
        setShowMeasure(false);
      };

      return (
        <div className={desktop ? "fade-in" : "px-5 pt-5 fade-in"}>
          <h1 className="text-2xl lg:text-3xl font-bold text-zinc-100 mb-5">Profile</h1>

          {/* Avatar + name */}
          <Card className="mb-4 text-center py-6">
            <div className="w-20 h-20 rounded-full mx-auto flex items-center justify-center text-3xl font-bold text-zinc-900 mb-3"
              style={{ background: ACCENT }}>
              {profile.name?.[0]?.toUpperCase() || "U"}
            </div>
            <div className="font-bold text-zinc-100 text-lg">{profile.name}</div>
            <div className="text-xs text-zinc-500 mt-0.5 mono">
              {profile.age}y · {profile.height}cm · {profile.gender}
            </div>
          </Card>

          {/* Body stats */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Body</h2>
          <div className="grid grid-cols-2 gap-3 mb-4">
            <Card>
              <div className="text-xs text-zinc-500">BMR</div>
              <div className="text-xl font-bold text-zinc-100 mono">{bmr}</div>
              <div className="text-xs text-zinc-600">resting kcal</div>
            </Card>
            <Card>
              <div className="text-xs text-zinc-500">TDEE</div>
              <div className="text-xl font-bold text-zinc-100 mono">{tdee}</div>
              <div className="text-xs text-zinc-600">daily burn</div>
            </Card>
          </div>

          {/* Measurements */}
          <Card className="mb-4">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <Ruler className="w-4 h-4 text-zinc-400" />
                <span className="text-zinc-100 font-semibold">Body measurements</span>
              </div>
              <button onClick={() => setShowMeasure(true)}
                className="text-xs text-lime-400 font-semibold flex items-center gap-1">
                <Plus className="w-3 h-3" /> Log
              </button>
            </div>
            {lastMeasurement ? (
              <div className="grid grid-cols-3 gap-3">
                <MeasureBox label="Chest" val={lastMeasurement.chest} />
                <MeasureBox label="Waist" val={lastMeasurement.waist} />
                <MeasureBox label="Arms" val={lastMeasurement.arms} />
              </div>
            ) : (
              <div className="text-center text-zinc-600 text-xs py-2">No measurements yet</div>
            )}
            {lastMeasurement && (
              <div className="text-xs text-zinc-600 mt-3 mono text-center">Last: {fmtDate(lastMeasurement.date)}</div>
            )}
          </Card>

          {/* Settings */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Settings</h2>
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl divide-y divide-zinc-800 mb-4">
            <SettingRow icon={Target} label="Goal weight" value={`${profile.goalWeight} kg`} />
            <SettingRow icon={Calendar} label="Duration" value={`${profile.durationDays} days`} />
            <SettingRow icon={Bell} label="Notifications" value="On" />
            <SettingRow icon={Zap} label="No-tracking mode"
              value={profile.noTracking ? "On" : "Off"}
              onClick={() => setProfile({ ...profile, noTracking: !profile.noTracking })} />
          </div>

          {/* Reset */}
          <button onClick={() => {
            if (confirm("Reset all data? This cannot be undone.")) {
              ["ftp:profile", "ftp:weights", "ftp:workouts", "ftp:meals", "ftp:water", "ftp:measurements", "ftp:streak"]
                .forEach(k => window.storage.delete(k));
              location.reload();
            }
          }}
            className="w-full py-3 text-zinc-600 text-xs hover:text-red-400">
            Reset all data
          </button>

          {/* Measurement modal */}
          {showMeasure && (
            <Modal onClose={() => setShowMeasure(false)} title="Log measurements">
              <Field label="Chest (cm)">
                <NumberStepper value={newM.chest} onChange={v => setNewM({ ...newM, chest: v })} min={50} max={200} step={0.5} decimals={1} suffix="cm" />
              </Field>
              <Field label="Waist (cm)">
                <NumberStepper value={newM.waist} onChange={v => setNewM({ ...newM, waist: v })} min={40} max={200} step={0.5} decimals={1} suffix="cm" />
              </Field>
              <Field label="Arms (cm)">
                <NumberStepper value={newM.arms} onChange={v => setNewM({ ...newM, arms: v })} min={20} max={70} step={0.5} decimals={1} suffix="cm" />
              </Field>
              <button onClick={saveMeasurement}
                className="w-full mt-2 py-3.5 rounded-xl font-bold text-zinc-900 flex items-center justify-center gap-2"
                style={{ background: ACCENT }}>
                <Save className="w-4 h-4" /> Save
              </button>
            </Modal>
          )}
        </div>
      );
    }

    const MeasureBox = ({ label, val }) => (
      <div className="bg-zinc-800/50 rounded-xl p-3 text-center">
        <div className="text-xs text-zinc-500 uppercase tracking-wider font-semibold">{label}</div>
        <div className="text-lg font-bold text-zinc-100 mono mt-0.5">{val} <span className="text-xs text-zinc-500">cm</span></div>
      </div>
    );

    const SettingRow = ({ icon: Icon, label, value, onClick }) => (
      <button onClick={onClick} className="w-full flex items-center gap-3 p-4 hover:bg-zinc-800/50 transition text-left">
        <Icon className="w-4 h-4 text-zinc-500" />
        <span className="flex-1 text-sm text-zinc-200">{label}</span>
        <span className="text-sm text-zinc-500 mono">{value}</span>
        <ChevronRight className="w-4 h-4 text-zinc-700" />
      </button>
    );

    // ============ SHARED COMPONENTS ============
    const Card = ({ children, className = "" }) => (
      <div className={`bg-zinc-900 border border-zinc-800 rounded-2xl p-4 ${className}`}>
        {children}
      </div>
    );

    function Modal({ onClose, title, children, fullHeight }) {
      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/70 backdrop-blur-sm sm:items-center"
          onClick={onClose}>
          <div className={`w-full sm:max-w-md bg-zinc-900 border border-zinc-800 rounded-t-3xl sm:rounded-3xl p-5 fade-in ${fullHeight ? "max-h-[85vh]" : ""}`}
            onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-bold text-zinc-100">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center">
                <X className="w-4 h-4 text-zinc-400" />
              </button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function BottomNav({ tab, setTab }) {
      const items = [
        { key: "home", icon: Home, label: "Home" },
        { key: "workout", icon: Dumbbell, label: "Train" },
        { key: "nutrition", icon: Apple, label: "Food" },
        { key: "progress", icon: TrendingUp, label: "Progress" },
        { key: "profile", icon: User, label: "Profile" }
      ];
      return (
        <div className="absolute bottom-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-xl border-t border-zinc-800 px-2 pt-2 pb-3">
          <div className="flex justify-around">
            {items.map(({ key, icon: Icon, label }) => (
              <button key={key} onClick={() => setTab(key)}
                className="flex flex-col items-center gap-1 px-3 py-1.5 transition">
                <Icon className="w-5 h-5 transition" style={{ color: tab === key ? ACCENT : "#71717a" }} />
                <span className="text-[10px] font-semibold tracking-wide" style={{ color: tab === key ? ACCENT : "#71717a" }}>{label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }


    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => { const el = document.getElementById('loading'); if (el) el.remove(); }, 400);
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
