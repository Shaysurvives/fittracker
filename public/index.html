  <script>
    const KEY_TO_ENDPOINT = {
      'ftp:profile': '/api/profile',
      'ftp:weights': '/api/weights',
      'ftp:workouts': '/api/workouts',
      'ftp:meals': '/api/meals',
      'ftp:water': '/api/water',
      'ftp:measurements': '/api/measurements',
      'ftp:streak': '/api/streak',
      'ftp:customFoods': '/api/customFoods',
      'ftp:mealPresets': '/api/mealPresets'
    };
    let saveQueue = Promise.resolve();
    function queued(fn) { saveQueue = saveQueue.then(fn).catch((e) => console.error(e)); return saveQueue; }
    window.storage = {
      get: async (key) => {
        const ep = KEY_TO_ENDPOINT[key]; if (!ep) return null;
        try {
          const res = await fetch(ep, { credentials: 'include' }); if (!res.ok) return null;
          const data = await res.json();
          if (data === null || data === undefined) return null;
          if (Array.isArray(data) && data.length === 0) return null;
          if (typeof data === 'object' && !Array.isArray(data) && Object.keys(data).length === 0 && key !== 'ftp:water') {
            if (key === 'ftp:profile') return null;
          }
          return { key, value: JSON.stringify(data) };
        } catch (e) { console.error('GET failed for', key, e); return null; }
      },
      set: async (key, value) => queued(async () => {
        const ep = KEY_TO_ENDPOINT[key]; if (!ep) return null;
        try { await fetch(ep, { method: 'PUT', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: value }); return { key, value }; }
        catch (e) { console.error('PUT failed for', key, e); return null; }
      }),
      delete: async (key) => {
        if (key === 'ftp:profile') { try { await fetch('/api/all', { method: 'DELETE', credentials: 'include' }); } catch (e) {} }
        return { key, deleted: true };
      }
    };
    fetch('/api/stats', { credentials: 'include' }).then((r) => r.ok ? null : Promise.reject()).catch(() => {
      const el = document.getElementById('loading');
      if (el) el.innerHTML = '<div class="err"><strong style="color:#f87171">Backend not reachable</strong><br><br>Make sure the server is running.</div>';
    });
  </script>

          { role: "isolation", muscle: "shoulders", pattern: "single_joint",  options: ["lat_raise_db"] },
          { role: "isolation", muscle: "shoulders", pattern: "single_joint",  options: ["lat_raise_cable"] },
          { role: "isolation", muscle: "shoulders", pattern: "single_joint",  options: ["rear_delt_db"] },
          { role: "isolation", muscle: "shoulders", pattern: "single_joint",  options: ["face_pull"] },
        ],
        Legs: [
          { role: "primary",   muscle: "quads",      pattern: "quad_dominant", options: ["squat_bb", "front_squat"] },
          { role: "primary",   muscle: "hamstrings", pattern: "hip_dominant",  options: ["rdl_bb"] },
          { role: "secondary", muscle: "quads",      pattern: "quad_dominant", options: ["leg_press", "hack_squat"] },
          { role: "secondary", muscle: "quads",      pattern: "quad_dominant", options: ["bulgarian", "lunges"] },
          { role: "isolation", muscle: "hamstrings", pattern: "knee_iso",      options: ["leg_curl"] },
          { role: "isolation", muscle: "quads",      pattern: "knee_iso",      options: ["leg_ext"] },
          { role: "isolation", muscle: "calves",     pattern: "single_joint",  options: ["calf_raise_std"] },
          { role: "core",      muscle: "core",       pattern: "core",          options: ["plank", "hanging_kr"] },
        ],
        Arms: [
          { role: "primary",   muscle: "biceps",  pattern: "single_joint",   options: ["curl_bb"] },
          { role: "secondary", muscle: "biceps",  pattern: "single_joint",   options: ["incline_curl", "preacher_curl"] },
          { role: "isolation", muscle: "biceps",  pattern: "single_joint",   options: ["hammer_curl"] },
          { role: "isolation", muscle: "biceps",  pattern: "single_joint",   options: ["cable_curl"] },
          { role: "secondary", muscle: "triceps", pattern: "horizontal_push", options: ["cgbp", "dips_tri"] },
          { role: "isolation", muscle: "triceps", pattern: "single_joint",    options: ["skullcrushers"] },
          { role: "isolation", muscle: "triceps", pattern: "single_joint",    options: ["pushdown_rope"] },
          { role: "isolation", muscle: "triceps", pattern: "single_joint",    options: ["oh_extension"] },
        ],
      },
    };

    // Sets/reps/rest for each exercise role, scaled by tier.
    // Tuned so total weekly volume per muscle group stays within MEV-MRV across the full week.
    function setsRepsRestFor(role, tier) {
      const profiles = {
        high: { // 6 lift days/week — keep per-exercise volume LOW so weekly stays in MAV
          primary:   { sets: 3, reps: "6-8",   rest: 150 },
          secondary: { sets: 3, reps: "8-12",  rest: 90  },
          isolation: { sets: 2, reps: "12-15", rest: 60  },
          core:      { sets: 3, reps: "30-60s", rest: 45  },
        },
        moderate: { // 5 lift days/week — moderate per-exercise
          primary:   { sets: 4, reps: "5-8",   rest: 180 },
          secondary: { sets: 3, reps: "6-10",  rest: 120 },
          isolation: { sets: 2, reps: "10-15", rest: 75  },
          core:      { sets: 3, reps: "30-60s", rest: 45  },
        },
        low: { // 3 lift days/week — push per-exercise volume up to hit MEV
          primary:   { sets: 5, reps: "4-6",   rest: 240 },
          secondary: { sets: 4, reps: "6-8",   rest: 150 },
          isolation: { sets: 4, reps: "8-12",  rest: 90  },
          core:      { sets: 3, reps: "30-60s", rest: 45  },
        },
      };
      return profiles[tier]?.[role] || profiles.moderate.isolation;
    }

    // Build the day's prescription using the template + tier.
    // Returns array of exercise objects with sets/reps/rest/role/muscle metadata.
    function getDayPrescription(splitType, day, tier) {
      const slots = DAY_TEMPLATES[splitType]?.[day] || [];

      // Trim slot count by tier — high pace gets more exercises, low pace fewer (since longer rest = longer session)
      const maxSlots = tier === "high" ? 8 : tier === "moderate" ? 7 : 6;
      const trimmed = slots.slice(0, maxSlots);

      // For each slot, pick the FIRST option (which is the gold-standard choice).
      // The user can swap via the picker mid-workout if they don't have the equipment.
      return trimmed.map((slot) => {
        const exKey = slot.options[0];
        const ex = EX[exKey];
        const cfg = setsRepsRestFor(slot.role, tier);
        return {
          name: ex.name,
          role: slot.role,
          muscle: slot.muscle,
          secondaryMuscles: ex.secondary || [],
          pattern: slot.pattern,
          sets: cfg.sets,
          reps: cfg.reps,
          rest: cfg.rest,
        };
      });
    }

    // Calculate total weekly sets per muscle group across the user's full week.
    // Counts primary muscle as 1 set; secondary muscles count as 0.5 sets (per Schoenfeld's "fractional volume").
    function calculateWeeklyVolume(splitType, tier, weekPlan) {
      const totals = {};
      weekPlan.forEach((dayType) => {
        if (dayType === "Rest" || dayType === "Cardio") return;
        const rx = getDayPrescription(splitType, dayType, tier);
        rx.forEach((ex) => {
          totals[ex.muscle] = (totals[ex.muscle] || 0) + ex.sets;
          ex.secondaryMuscles?.forEach((m) => {
            totals[m] = (totals[m] || 0) + ex.sets * 0.5;
          });
        });
      });
      // Round for display
      Object.keys(totals).forEach((k) => { totals[k] = +totals[k].toFixed(1); });
      return totals;
    }

    // Returns volume status for a muscle: "low" / "optimal" / "high"
    // based on MEV/MAV/MRV thresholds (research-supported ranges).
    function volumeStatusFor(muscle, sets) {
      // MEV = floor (below this, you'll lose muscle in a deficit)
      // MRV = ceiling (above this, recovery is compromised — esp. in a deficit)
      // Back has a higher ceiling because it's actually 5+ sub-muscles (lats, traps, rhomboids, rear delts, erectors).
      // Biceps tolerate high volume because they recover fast and are hit indirectly during all back work.
      const MEV = { chest: 8,  back: 10, shoulders: 8,  biceps: 6,  triceps: 6,  quads: 8,  hamstrings: 6, glutes: 6, calves: 6, core: 4 };
      const MRV = { chest: 22, back: 30, shoulders: 24, biceps: 22, triceps: 20, quads: 20, hamstrings: 18, glutes: 18, calves: 16, core: 16 };
      const mev = MEV[muscle] || 6;
      const mrv = MRV[muscle] || 18;
      if (sets < mev) return "low";
      if (sets > mrv) return "high";
      return "optimal";
    }

    // ============ METABOLIC FINISHERS ============
    // Optional 10-15 min add-on at the end of a workout for extra calorie burn.
    // These are deliberately HIGH-CARDIO, LOW-LOAD movements — they burn calories
    // without compromising recovery from heavy lifting (which would be counterproductive in a deficit).
    // kcal estimates assume 70-80kg bodyweight at moderate effort.
    const FINISHERS = [
      { id: "kb_swing",     name: "Kettlebell Swings",      duration: "3 rounds × 30s on / 30s off", kcal: 90,  pattern: "hip_dominant",  diff: 2, equipment: "kettlebell" },
      { id: "burpees",      name: "Burpees",                duration: "3 rounds × 30s on / 30s off", kcal: 110, pattern: "full_body",     diff: 3, equipment: "bodyweight" },
      { id: "rower",        name: "Row Machine Sprint",     duration: "5 × 250m all-out, 60s rest",  kcal: 130, pattern: "full_body",     diff: 2, equipment: "rower" },
      { id: "bike_sprint",  name: "Bike Sprint Intervals",  duration: "8 × 20s on / 40s off",         kcal: 100, pattern: "lower",         diff: 2, equipment: "bike" },
      { id: "jumprope",     name: "Jump Rope",              duration: "5 × 60s on / 30s off",         kcal: 80,  pattern: "calves",        diff: 1, equipment: "rope" },
      { id: "sled_push",    name: "Sled Push",              duration: "6 × 20m, walk back rest",      kcal: 130, pattern: "lower",         diff: 3, equipment: "sled" },
      { id: "battle_ropes", name: "Battle Ropes",           duration: "4 × 30s on / 30s off",         kcal: 80,  pattern: "upper",         diff: 2, equipment: "ropes" },
      { id: "farmers_walk", name: "Farmer's Walk",          duration: "4 × 30m carry, 60s rest",      kcal: 70,  pattern: "full_body",     diff: 2, equipment: "dumbbells" },
      { id: "stair_climb",  name: "Stair Climber",          duration: "10 min steady, fast pace",     kcal: 100, pattern: "lower",         diff: 1, equipment: "stairs" },
      { id: "jump_squats",  name: "Jump Squats",            duration: "4 × 30s on / 30s off",         kcal: 85,  pattern: "lower",         diff: 2, equipment: "bodyweight" },
    ];

    // Estimate calories burned during a strength workout.
    // Based on research (Vella et al, Phillips et al): ~5 kcal/min at moderate intensity for ~70kg lifter.
    // Adjusted for bodyweight (heavier = burns more) and total volume (more sets = more EPOC).
    function estimateWorkoutBurn({ durationMin, totalSets, bodyweight = 75, finisherKcal = 0 }) {
      const baseRate = 5; // kcal/min for ~70kg
      const bwAdjust = bodyweight / 70;
      const baseBurn = durationMin * baseRate * bwAdjust;
      // Volume bonus — more sets = more EPOC (afterburn effect, ~5-10 kcal per intense set)
      const volumeBonus = totalSets * 6;
      return Math.round(baseBurn + volumeBonus + finisherKcal);
    }

    // Estimate burn for a planned workout from a prescription array
    // (each item: { sets, reps, rest }). Used to show approx kcal BEFORE the user starts.
    function estimateBurnFromPrescription(prescription, bodyweight = 75) {
      if (!prescription || prescription.length === 0) return 0;
      const totalSets = prescription.reduce((s, p) => s + (p.sets || 0), 0);
      // Avg ~2.5 min per set (rest + work) + 5 min warmup. Matches "~min" estimate elsewhere.
      const durationMin = Math.round(totalSets * 2.5 + 5);
      return estimateWorkoutBurn({ durationMin, totalSets, bodyweight });
    }

    // Estimate burn for an ad-hoc workout day (when user just sees the day card,
    // before a prescription is assigned). Uses a generic 4 sets × N exercises assumption.
    function estimateBurnForDay(exerciseCount, bodyweight = 75) {
      const totalSets = exerciseCount * 3.5; // typical: 3-4 sets per exercise
      const durationMin = Math.round(totalSets * 2.5 + 5);
      return estimateWorkoutBurn({ durationMin, totalSets, bodyweight });
    }

    // Estimate burn per individual exercise based on its set count + a compound multiplier.
    // Heavy compound lifts (squat, deadlift, bench) burn ~30% more per set than isolation work.
    function estimateExerciseBurn(exercise, bodyweight = 75) {
      const numSets = exercise.sets?.length || 0;
      if (numSets === 0) return 0;
      const name = (exercise.name || "").toLowerCase();
      // Detect heavy compounds — they involve more muscle mass = higher burn
      const isCompound =
        /squat|deadlift|bench press|overhead press|ohp|row|lunge|clean|snatch|thrust|carry|pull[- ]up|chin[- ]up|dip/.test(name) &&
        !/curl|extension|raise|fly|kickback/.test(name);
      const compoundMultiplier = isCompound ? 1.3 : 1.0;
      // Base time burn: ~2.5 min per set × 5 kcal/min × bodyweight adjustment
      const timeBurn = numSets * 2.5 * 5 * (bodyweight / 70);
      // Volume bonus: 6 kcal per set (EPOC effect)
      const volumeBonus = numSets * 6;
      return Math.round((timeBurn + volumeBonus) * compoundMultiplier);
    }

    // Suggest a starting weight based on the user's bodyweight + exercise type.
    // Conservative — always rounds down so you can progress, not regress.
    function suggestStartWeight(exerciseName, bodyweight) {
      const name = exerciseName.toLowerCase();
      // Compound barbell lifts — multiplier of bodyweight
      if (name.includes("squat") && !name.includes("split") && !name.includes("goblet") && !name.includes("sissy")) return Math.round(bodyweight * 0.6);
      if (name.includes("deadlift")) return Math.round(bodyweight * 0.7);
      if (name.includes("bench press") && !name.includes("close")) return Math.round(bodyweight * 0.5);
      if (name.includes("close-grip bench") || name.includes("incline barbell") || name.includes("decline barbell")) return Math.round(bodyweight * 0.4);
      if (name.includes("overhead press") || name.includes("ohp")) return Math.round(bodyweight * 0.3);
      if (name.includes("row") && (name.includes("barbell") || name.includes("pendlay") || name.includes("t-bar"))) return Math.round(bodyweight * 0.4);
      if (name.includes("hip thrust")) return Math.round(bodyweight * 0.6);
      // Dumbbell movements
      if (name.includes("incline") && name.includes("dumbbell")) return 12;
      if (name.includes("dumbbell press") || name.includes("db press")) return 14;
      if (name.includes("lateral raise") || name.includes("front raise") || name.includes("rear delt")) return 6;
      if (name.includes("hammer curl") || name.includes("db curl") || name.includes("dumbbell curl")) return 8;
      if (name.includes("bulgarian") || name.includes("lunge") || name.includes("step-up")) return 10;
      if (name.includes("romanian deadlift") && name.includes("db")) return 16;
      // Machines / cables
      if (name.includes("leg press")) return Math.round(bodyweight * 0.8);
      if (name.includes("lat pulldown") || name.includes("seated cable row")) return Math.round(bodyweight * 0.4);
      if (name.includes("leg curl") || name.includes("leg extension")) return Math.round(bodyweight * 0.3);
      if (name.includes("tricep pushdown") || name.includes("cable curl") || name.includes("face pull")) return 12;
      if (name.includes("cable fly") || name.includes("pec deck")) return 15;
      if (name.includes("calf raise")) return Math.round(bodyweight * 0.4);
      // Bodyweight — use bodyweight itself as the "weight" for volume calculations
      if (name.includes("pull-up") || name.includes("chin-up") || name.includes("dip") || name.includes("push-up") || name.includes("plank") || name.includes("knee raise") || name.includes("leg raise")) {
        return bodyweight;
      }
      // Default fallback
      return 10;
    }

    // ============ PLAN-BASED PREDICTION ENGINE ============
    // "If user follows the prescribed plan AND hits calorie target, what's the realistic outcome?"
    // Combines: weekly schedule (lifts + cardio days) → activity multiplier → TDEE → deficit → fat loss.
    // Accounts for: TDEE drop as bodyweight decreases (metabolic adaptation), realistic adherence,
    // and minimum-calorie floors so it never recommends dangerous deficits.

    const COMPLIANCE = { realistic: 0.7, perfect: 1.0 };
    const KCAL_PER_LIFT_SESSION = 270;   // average for a 45-60 min lifting session
    const KCAL_PER_CARDIO_SESSION = 320; // average for 25-40 min zone-2 cardio
    const MIN_KCAL_MALE = 1500;
    const MIN_KCAL_FEMALE = 1200;

    // Activity multiplier from total weekly sessions (lifts + cardio).
    // Conservative — assumes the rest of the day is normal (not deskbound, not super-active).
    function activityMultiplierFor(weeklySessions) {
      if (weeklySessions >= 6) return 1.55;  // moderately active
      if (weeklySessions >= 4) return 1.45;  // light-moderate
      if (weeklySessions >= 2) return 1.375; // lightly active
      return 1.2;                             // sedentary
    }

    // Gets the user's current weekly schedule based on their profile.
    // Returns: { liftDays, cardioDays, totalSessions, sessionBurnPerWeek }
    function planSummaryFor(profile) {
      const splitType = profile.splitType || "PPL";
      const totalLoss = Math.max(0.5, profile.startWeight - profile.goalWeight);
      const weeklyTarget = totalLoss / (profile.durationDays / 7);
      const tier = weeklyTarget > 0.7 ? "high" : weeklyTarget >= 0.4 ? "moderate" : "low";

      const plans = {
        PPL: {
          high:     ["Push", "Pull", "Legs", "Push", "Pull", "Legs", "Rest"],
          moderate: ["Push", "Pull", "Legs", "Rest", "Push", "Pull", "Cardio"],
          low:      ["Push", "Cardio", "Pull", "Rest", "Legs", "Cardio", "Rest"],
        },
        BRO: {
          high:     ["Chest", "Back", "Shoulders", "Legs", "Arms", "Cardio", "Rest"],
          moderate: ["Chest", "Back", "Shoulders", "Rest", "Legs", "Arms", "Cardio"],
          low:      ["Chest", "Back", "Cardio", "Legs", "Rest", "Arms", "Rest"],
        },
      };

      const week = plans[splitType][tier];
      const liftDays = week.filter((d) => d !== "Rest" && d !== "Cardio").length;
      const cardioDays = week.filter((d) => d === "Cardio").length;
      const totalSessions = liftDays + cardioDays;
      const sessionBurnPerWeek = liftDays * KCAL_PER_LIFT_SESSION + cardioDays * KCAL_PER_CARDIO_SESSION;
      return { splitType, tier, weeklyTarget, liftDays, cardioDays, totalSessions, sessionBurnPerWeek, week };
    }

    // Calculate predicted weight loss IF the user follows the prescribed plan and calorie target.
    // `compliance` ∈ [0, 1] — what fraction of plan + diet they actually hit.
    function predictPlanOutcome(profile, compliance = COMPLIANCE.realistic) {
      const summary = planSummaryFor(profile);
      const { totalSessions, sessionBurnPerWeek } = summary;
      const activityMult = activityMultiplierFor(totalSessions);

      // BMR at starting weight, plus what activity multiplier covers vs. extra session burn.
      // Most TDEE formulas already include exercise. Our approach: use a moderately-light multiplier
      // for lifestyle activity, then add prescribed sessions as discrete burn on top of that.
      const startBmr = calcBMR({ ...profile, weight: profile.startWeight });
      const lifestyleTDEE = startBmr * 1.2; // sedentary baseline (the "you-without-the-plan" burn)
      const planTDEE = lifestyleTDEE + (sessionBurnPerWeek / 7); // average daily burn including planned sessions

      // Calorie target — same logic as the dashboard
      const totalLoss = Math.max(0.5, profile.startWeight - profile.goalWeight);
      const dailyDeficitTarget = Math.round((totalLoss * KCAL_PER_KG_FAT) / profile.durationDays);
      const minKcal = profile.gender === "female" ? MIN_KCAL_FEMALE : MIN_KCAL_MALE;
      const calorieTarget = Math.max(minKcal, Math.round(planTDEE - dailyDeficitTarget));

      // Apply compliance discount
      const effectiveBurn = lifestyleTDEE + (sessionBurnPerWeek * compliance) / 7;
      const effectiveIntake = calorieTarget + (planTDEE - calorieTarget) * (1 - compliance) * 0.5; // missed meals = some over-eating
      const effectiveDailyDeficit = effectiveBurn - effectiveIntake;

      // Convert to weekly + monthly fat loss
      const weeklyLossKg = (effectiveDailyDeficit * 7) / KCAL_PER_KG_FAT;
      const monthlyLossKg = (effectiveDailyDeficit * 30) / KCAL_PER_KG_FAT;

      // Trajectory accounting for metabolic adaptation: TDEE drops ~10 kcal per kg lost (rough rule).
      // We simulate week-by-week so the end-of-plan weight is realistic, not naive linear extrapolation.
      let simWeight = profile.startWeight;
      let totalDays = profile.durationDays;
      for (let day = 0; day < totalDays; day++) {
        const lostSoFar = profile.startWeight - simWeight;
        // Each kg lost reduces BMR by ~10 kcal/day
        const adaptedBmr = startBmr - lostSoFar * 10;
        const adaptedLifestyle = adaptedBmr * 1.2;
        const adaptedBurn = adaptedLifestyle + (sessionBurnPerWeek * compliance) / 7;
        const dayDeficit = adaptedBurn - effectiveIntake;
        simWeight -= dayDeficit / KCAL_PER_KG_FAT;
        if (simWeight <= profile.goalWeight) {
          // Reached goal early — return the day count
          return {
            ...summary,
            compliance,
            calorieTarget,
            planTDEE: Math.round(planTDEE),
            weeklyLossKg: +weeklyLossKg.toFixed(2),
            monthlyLossKg: +monthlyLossKg.toFixed(1),
            endWeight: profile.goalWeight,
            daysToGoal: day + 1,
            reachesGoal: true,
            deficitFloor: calorieTarget === minKcal,
          };
        }
      }

      return {
        ...summary,
        compliance,
        calorieTarget,
        planTDEE: Math.round(planTDEE),
        weeklyLossKg: +weeklyLossKg.toFixed(2),
        monthlyLossKg: +monthlyLossKg.toFixed(1),
        endWeight: +simWeight.toFixed(1),
        daysToGoal: totalDays,
        reachesGoal: simWeight <= profile.goalWeight + 0.1,
        deficitFloor: calorieTarget === minKcal,
      };
    }

    // ============ AVATAR BODY MORPHING ============
    // Returns SVG path string for a humanoid silhouette.
    // progress: 0 = starting body (heavier), 1 = goal body (leaner).
    function computeBodyPath(progress, gender = "male") {
      const female = gender === "female";
      // [start_width, goal_width] half-widths from center for each body region
      const W = {
        shoulder: female ? [50, 46] : [62, 58],
        chest:    female ? [46, 44] : [56, 52],
        waist:    female ? [54, 34] : [58, 38],
        hip:      female ? [58, 50] : [54, 50],
        thigh:    female ? [25, 22] : [27, 24],
        calf:     female ? [16, 15] : [18, 17],
      };
      const lerp = (k) => W[k][0] + (W[k][1] - W[k][0]) * progress;
      const sh = lerp("shoulder"), ch = lerp("chest"), wa = lerp("waist");
      const hi = lerp("hip"), th = lerp("thigh"), ca = lerp("calf");

      const cx = 100;
      const Y_SH = 90, Y_CH = 125, Y_WA = 170, Y_HIP = 210;
      const Y_KNEE = 295, Y_ANKLE = 380, CR = 5; // crotch half-width

      return `
        M ${cx + sh} ${Y_SH}
        Q ${cx + ch + 3} ${Y_CH - 8} ${cx + ch} ${Y_CH}
        Q ${cx + wa + 5} ${Y_WA - 12} ${cx + wa} ${Y_WA}
        Q ${cx + hi + 3} ${Y_HIP - 8} ${cx + hi} ${Y_HIP}
        L ${cx + th} ${Y_KNEE}
        L ${cx + ca} ${Y_ANKLE}
        L ${cx + CR} ${Y_ANKLE}
        L ${cx + CR + 1} ${Y_KNEE}
        L ${cx + CR + 2} ${Y_HIP + 2}
        L ${cx - CR - 2} ${Y_HIP + 2}
        L ${cx - CR - 1} ${Y_KNEE}
        L ${cx - CR} ${Y_ANKLE}
        L ${cx - ca} ${Y_ANKLE}
        L ${cx - th} ${Y_KNEE}
        L ${cx - hi} ${Y_HIP}
        Q ${cx - hi - 3} ${Y_HIP - 8} ${cx - wa} ${Y_WA}
        Q ${cx - wa - 5} ${Y_WA - 12} ${cx - ch} ${Y_CH}
        Q ${cx - ch - 3} ${Y_CH - 8} ${cx - sh} ${Y_SH}
        Z
      `;
    }

    // ============ TIPS ENGINE ============
    const TIPS = [
      { cat: "protein", title: "Hit your protein", body: "Aim for 1.6–2g per kg bodyweight. Protein preserves muscle in a deficit and keeps you full longer than carbs or fat.", iconKey: "apple",

      { cat: "trend", title: "Trust the trend", body: "Weight fluctuates 1–3 kg daily from water, sodium, and food in your gut. Look at weekly averages, not daily numbers.", iconKey: "trending" },
      { cat: "slow", title: "Eat slowly", body: "Your gut takes ~20 minutes to signal fullness. Slow eating = less overeating, no calorie counting needed.", iconKey: "clock" },
      { cat: "fiber", title: "Volume hack: fiber", body: "Vegetables and fruit fill you up for almost no calories. A big salad before dinner cuts your main-course intake naturally.", iconKey: "apple" },
      { cat: "alcohol", title: "Watch liquid calories", body: "Beer, juice, and lattes hide hundreds of calories. They don't fill you up — your stomach barely notices them.", iconKey: "droplet" },
    ];

    const TIP_ICONS = {
      apple: Apple, droplet: Droplet, activity: Activity, target: Target,
      dumbbell: Dumbbell, heart: Heart, trending: TrendingUp, clock: Clock,
    };

    function pickTip(ctx) {
      const triggered = TIPS.filter((t) => t.trigger?.(ctx));
      if (triggered.length) return triggered[ctx.tipIdx % triggered.length];
      const general = TIPS.filter((t) => !t.trigger);

    const calcBMR = (p) => {
      if (!p) return 1500;
      const { weight, height, age, gender } = p;
      return gender === "female"
        ? 10 * weight + 6.25 * height - 5 * age - 161
        : 10 * weight + 6.25 * height - 5 * age + 5;
    };

    const calcTDEE = (p, workoutBoost = false) => {
      const bmr = calcBMR(p);
      const factor = workoutBoost ? 1.55 : 1.375;
      return Math.round(bmr * factor);
    };

    // ============ STORAGE LAYER ============
    const useStore = (key, initial) => {
      const [val, setVal] = useState(initial);
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const r = await window.storage.get(key);
            if (!cancelled && r && r.value) setVal(JSON.parse(r.value));
          } catch (e) { /* not found = use initial */ }
          if (!cancelled) setLoaded(true);
        })();
        return () => { cancelled = true; };
      }, [key]);

      const save = async (next) => {
        setVal(next);
        try { await window.storage.set(key, JSON.stringify(next)); } catch (e) {}
      };

      return [val, save, loaded];
    };

    // ============ WEIGHT HISTORY CARD ============
    function WeightHistoryCard({ weights, setWeights }) {
      const [expanded, setExpanded] = useState(false);
      const [editingDate, setEditingDate] = useState(null);
      const [editValue, setEditValue] = useState(0);

      const sorted = [...weights].sort((a, b) => b.date.localeCompare(a.date));
      const visible = expanded ? sorted : sorted.slice(0, 1);

      const updateEntry = (date) => {
        const filtered = weights.filter((w) => w.date !== date);
        setWeights([...filtered, { date, weight: +editValue }].sort((a, b) => a.date.localeCompare(b.date)));
        setEditingDate(null);
      };

      const deleteEntry = (date) => {
        setWeights(weights.filter((w) => w.date !== date));
      };

      return (
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-4">
          <button onClick={() => setExpanded(!expanded)}
            className="w-full flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <Calendar className="w-3.5 h-3.5 text-zinc-500" />
              <span className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">Weight history</span>
              <span className="text-zinc-600 text-xs mono">({weights.length})</span>
            </div>
            <ChevronRight className={`w-4 h-4 text-zinc-500 transition-transform ${expanded ? "rotate-90" : ""}`} />
          </button>

          <div className="space-y-1">
            {visible.map((entry, i) => {
              const isEditing = editingDate === entry.date;
              const prev = sorted[sorted.findIndex(s => s.date === entry.date) + 1];
              const delta = prev ? entry.weight - prev.weight : 0;
              return (
                <div key={entry.date} className="flex items-center gap-2 py-2 border-t border-zinc-800/60 first:border-0">
                  <div className="w-20 text-xs text-zinc-500 mono shrink-0">{fmtDate(entry.date)}</div>
                  {isEditing ? (
                    <>
                      <input type="number" step="0.1" value={editValue} autoFocus
                        onChange={(e) => setEditValue(e.target.value)}
                        className="flex-1 bg-zinc-800 border border-lime-500 rounded-lg px-2 py-1.5 text-zinc-100 mono text-sm text-center outline-none" />
                      <button onClick={() => updateEntry(entry.date)}
                        className="w-7 h-7 rounded-lg bg-lime-400 text-zinc-900 flex items-center justify-center">
                        <Check className="w-3.5 h-3.5" strokeWidth={3} />
                      </button>
                      <button onClick={() => setEditingDate(null)}
                        className="w-7 h-7 rounded-lg bg-zinc-800 text-zinc-400 flex items-center justify-center">
                        <X className="w-3.5 h-3.5" />
                      </button>
                    </>
                  ) : (
                    <>
                      <div className="flex-1 text-zinc-100 font-bold mono">{entry.weight.toFixed(1)} <span className="text-xs text-zinc-500 font-normal">kg</span></div>
                      {prev && delta !== 0 && (
                        <div className={`text-[11px] mono ${delta < 0 ? "text-lime-400" : "text-orange-400"}`}>
                          {delta < 0 ? "" : "+"}{delta.toFixed(1)}
                        </div>
                      )}
                      <button onClick={() => { setEditingDate(entry.date); setEditValue(entry.weight); }}
                        className="text-zinc-600 hover:text-zinc-300 p-1">
                        <Edit3 className="w-3.5 h-3.5" />
                      </button>
                      {weights.length > 1 && (
                        <button onClick={() => deleteEntry(entry.date)}

                        </button>
                      )}
                    </>
                  )}
                </div>
              );

    // ============ DASHBOARD ============
    function Dashboard({ profile, weights, workouts, meals, water, streak, setTab, setWeights, setWater, desktop = false }) {
      const today = todayKey();
      const todayMeals = meals.filter(m => m.date === today);
      const todayWorkout = workouts.find(w => w.date === today);
      const todayWater = water[today] || 0;

      const todayCal = todayMeals.reduce((s, m) => s + m.foods.reduce((sf, f) => sf + f.cal * f.qty, 0), 0);
      const todayProtein = todayMeals.reduce((s, m) => s + m.foods.reduce((sf, f) => sf + f.p * f.qty, 0), 0);

      const currentWeight = weights.length ? weights[weights.length - 1].weight : profile.weight;

      // Workout consistency over last 14 days
      const workoutDaysLast14 = useMemo(() => {
        let count = 0;
        for (let i = 0; i < 14; i++) {
          const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
          if (workouts.some(w => w.date === d)) count++;
        }
        return count;
      }, [workouts]);

      const adherence = Math.round((workoutDaysLast14 / 14) * 100);
      const consistent = adherence >= 50;

      // Calorie targets and predictions
      const tdee = calcTDEE(profile, consistent);
      const totalLoss = profile.startWeight - profile.goalWeight;
      const dailyDeficitTarget = Math.round((totalLoss * KCAL_PER_KG_FAT) / profile.durationDays);
      const calorieTarget = Math.max(1200, tdee - dailyDeficitTarget);

      const calRemaining = calorieTarget - todayCal;
      const calPct = Math.min(100, (todayCal / calorieTarget) * 100);

      // Goal progress
      const lostSoFar = profile.startWeight - currentWeight;
      const goalPct = Math.max(0, Math.min(100, (lostSoFar / totalLoss) * 100));

      const startDate = new Date(profile.startDate);
      const dayDelta = Math.floor((Date.now() - startDate.getTime()) / 86400000);
      const daysRemaining = Math.max(0, profile.durationDays - dayDelta);

      // Predictions based on workout-adjusted TDEE
      const expectedDailyDeficit = consistent ? dailyDeficitTarget * 1.1 : dailyDeficitTarget * 0.9;
      const expectedWeeklyLoss = (expectedDailyDeficit * 7) / KCAL_PER_KG_FAT;
      const expectedMonthlyLoss = (expectedDailyDeficit * 30) / KCAL_PER_KG_FAT;

      const [showLogWeight, setShowLogWeight] = useState(false);
      const [newWt, setNewWt] = useState(currentWeight);
      const [logDate, setLogDate] = useState(today);

      const logWeight = () => {
        const filtered = weights.filter(w => w.date !== logDate);
        setWeights([...filtered, { date: logDate, weight: +newWt }].sort((a, b) => a.date.localeCompare(b.date)));
        setShowLogWeight(false);
        setLogDate(today); // reset for next time
      };

      return (
        <div className={desktop ? "fade-in" : "px-5 pt-5 fade-in"}>
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <div className="text-zinc-500 text-sm">Hey {profile.name?.split(" ")[0] || "there"} 👋</div>
              <div className="text-zinc-100 font-bold text-2xl lg:text-3xl">Let's crush today.</div>
            </div>
            <div className="flex gap-2">
              <button className="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center relative">
                <Bell className="w-4 h-4 text-zinc-400" />
                <span className="absolute top-2 right-2 w-1.5 h-1.5 rounded-full" style={{ background: ACCENT }} />
              </button>
              <div className="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-zinc-900"
                style={{ background: ACCENT }}>
                {profile.name?.[0]?.toUpperCase() || "U"}
              </div>
            </div>
          </div>

          {/* Multi-column on desktop, stacked on mobile */}
          <div className={desktop ? "desktop-grid-2" : ""}>

          {/* Hero card – weight + goal */}
          <div className="rounded-3xl p-5 mb-4 relative overflow-hidden desktop-span-all"
            style={{ background: `linear-gradient(135deg, ${ACCENT} 0%, ${ACCENT_DARK} 100%)` }}>
            <div className="absolute -right-10 -top-10 w-40 h-40 rounded-full bg-white/10" />
            <div className="absolute -right-20 -bottom-16 w-48 h-48 rounded-full bg-black/10" />

            <div className="relative z-10">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <div className="text-zinc-900/60 text-xs font-semibold uppercase tracking-wider">Current weight</div>
                  <div className="flex items-baseline gap-2 mt-1">
                    <span className="text-5xl font-bold text-zinc-900 mono">{currentWeight.toFixed(1)}</span>
                    <span className="text-zinc-900/70 font-semibold">kg</span>
                  </div>
                </div>
                <button onClick={() => { setNewWt(currentWeight); setShowLogWeight(true); }}
                  className="bg-zinc-900 text-lime-400 rounded-full px-3 py-1.5 text-xs font-semibold flex items-center gap-1">
                  <Plus className="w-3 h-3" /> Log
                </button>
              </div>

              <div className="bg-zinc-900/20 backdrop-blur rounded-2xl p-3.5 mt-4">
                <div className="flex justify-between text-xs font-semibold text-zinc-900 mb-2">
                  <span>Goal: {profile.goalWeight} kg</span>
                  <span>{goalPct.toFixed(0)}% there</span>
                </div>
                <div className="h-2 bg-zinc-900/20 rounded-full overflow-hidden">
                  <div className="h-full bg-zinc-900 rounded-full transition-all duration-700"
                    style={{ width: `${goalPct}%` }} />
                </div>
                <div className="flex justify-between text-xs text-zinc-900/70 mt-2 mono">
                  <span>Lost: {lostSoFar.toFixed(1)} kg</span>
                  <span>{daysRemaining} days left</span>
                </div>
              </div>
            </div>
          </div>

          {/* Transforming avatar + coach tip */}
          <AvatarCard
            profile={profile}
            currentWeight={currentWeight}
            todayCal={todayCal}
            calorieTarget={calorieTarget}
            todayProtein={todayProtein}
            proteinTarget={Math.round(profile.weight * 1.8)}
            todayWater={todayWater}

          />

          {/* Headline prediction — what happens if you stick to the plan */}
          <PlanOutcomeCard profile={profile} />

          {/* Today's prescribed workout plan */}
          <TodaysPlanCard profile={profile} workouts={workouts} setTab={setTab} />

          {/* Streak + workout */}
          <div className="grid grid-cols-2 gap-3 mb-4">
            <Card>
              <div className="flex items-center gap-2 text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-1">
                <Flame className="w-3.5 h-3.5" style={{ color: "#fb923c" }} /> Streak
              </div>
              <div className="text-3xl font-bold text-zinc-100 mono">{streak.count}</div>

            <Card>
              <div className="flex items-center gap-2 text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-1">

              </div>
              <button onClick={() => setTab("workout")} className="text-xs text-zinc-500 hover:text-zinc-300">
                {todayWorkout ? "View →" : "Start →"}
              </button>
            </Card>
          </div>

          {/* Calories */}
          <Card className="mb-4">
            <div className="flex justify-between items-start mb-4">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">Today's calories</div>
                <div className="flex items-baseline gap-1 mt-1">
                  <span className="text-3xl font-bold text-zinc-100 mono">{Math.round(todayCal)}</span>
                  <span className="text-zinc-500">/ {calorieTarget}</span>
                </div>
              </div>
              <div className="text-right">
                <div className="text-xs text-zinc-500 uppercase tracking-wider font-semibold">Remaining</div>

            </div>
            <div className="h-2 bg-zinc-800 rounded-full overflow-hidden mb-3">
              <div className="h-full rounded-full transition-all duration-500"
                style={{
                  width: `${calPct}%`,
                  background: calPct > 100 ? "#fb923c" : ACCENT
                }} />
            </div>
            <div className="flex gap-4 text-xs">
              <span className="text-zinc-500">Protein: <span className="text-zinc-200 font-semibold mono">{Math.round(todayProtein)}g</span></span>
              <span className="text-zinc-500">Water: <span className="text-zinc-200 font-semibold mono">{todayWater}/8</span></span>

          {/* Predictions */}
          <div className="grid grid-cols-2 gap-3 mb-4">
            <Card>
              <div className="flex items-center gap-2 mb-1">

            <Card>
              <div className="flex items-center gap-2 mb-1">

              <div className="text-2xl font-bold mono" style={{ color: ACCENT }}>−{expectedMonthlyLoss.toFixed(1)}</div>
              <div className="text-xs text-zinc-600">kg expected</div>

          </div>

          {/* Water tracker */}
          <Card className="mb-4">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <Droplet className="w-4 h-4" style={{ color: "#38bdf8" }} />

              </div>
              <span className="text-sm text-zinc-500 mono">{todayWater}/8 glasses</span>
            </div>
            <div className="grid grid-cols-8 gap-1.5">
              {Array.from({ length: 8 }).map((_, i) => {
                const filled = i < todayWater;
                return (
                  <button key={i} onClick={() => setWater({ ...water, [today]: filled && i === todayWater - 1 ? i : i + 1 })}

                      background: filled ? "#38bdf8" : "#27272a",
                      border: `1px solid ${filled ? "#38bdf8" : "#3f3f46"}`
                    }}>
                    <Droplet className="w-3 h-3" style={{ color: filled ? "#fff" : "#52525b", fill: filled ? "#fff" : "transparent" }} />
                  </button>
                );
              })}
            </div>
          </Card>

          {/* Weight history (last 7 entries, editable) */}
          {weights.length > 0 && (
            <WeightHistoryCard weights={weights} setWeights={setWeights} />
          )}

          {/* Status banner */}
          <div className={`rounded-2xl p-4 mb-2 border ${
            consistent
              ? "bg-lime-400/10 border-lime-500/30"
              : "bg-orange-400/10 border-orange-500/30"
          }`}>
            <div className="flex items-center gap-3">
              {consistent ? <Trophy className="w-5 h-5 text-lime-400" /> : <Target className="w-5 h-5 text-orange-400" />}
              <div className="flex-1">
                <div className={`font-semibold text-sm ${consistent ? "text-lime-300" : "text-orange-300"}`}>
                  {consistent ? "You're on track!" : "Behind schedule"}
                </div>
                <div className="text-xs text-zinc-400">
                  {consistent
                    ? `${adherence}% workout adherence — keep it up!`
                    : `Only ${workoutDaysLast14}/14 workouts in last 2 weeks. Train ${4 - (workoutDaysLast14 % 4)}× this week to bounce back.`}
                </div>
              </div>
            </div>
          </div>

          {/* Log weight modal */}
          {showLogWeight && (
            <Modal onClose={() => setShowLogWeight(false)} title="Log weight">
              <Field label="Date">
                <input type="date" value={logDate}
                  max={today}
                  onChange={(e) => setLogDate(e.target.value)}
                  className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 focus:border-lime-500 outline-none mono" />
              </Field>
              <Field label="Weight">
                <NumberStepper value={newWt} onChange={setNewWt} min={30} max={250} step={0.1} decimals={1} suffix="kg" />
              </Field>
              {logDate !== today && (
                <div className="text-[11px] text-amber-400 mb-2 flex items-center gap-1.5">
                  <span>⚠</span>
                  <span>Backfilling for {fmtDate(logDate)}</span>

              )}
              <button onClick={logWeight}
                className="w-full mt-2 py-3.5 rounded-xl font-bold text-zinc-900 flex items-center justify-center gap-2"
                style={{ background: ACCENT }}>
                <Save className="w-4 h-4" /> Save weight
              </button>
            </Modal>
          )}

          </div>{/* end multi-column wrapper */}
        </div>
      );
    }

    // ============ WEEKLY SCHEDULE ENGINE ============
    // Returns a 7-entry plan (Mon..Sun) tuned to the user's weekly weight-loss target.
    // Each entry: { type: "Push"|"Pull"|...|"Cardio"|"Rest", lift: bool }
    function getWeeklySchedule(splitType, weeklyTargetKg) {
      const tier = weeklyTargetKg > 0.7 ? "high" : weeklyTargetKg >= 0.4 ? "moderate" : "low";

      const plans = {
        PPL: {
          high:     ["Push", "Pull", "Legs", "Push", "Pull", "Legs", "Rest"],
          moderate: ["Push", "Pull", "Legs", "Rest", "Push", "Pull", "Cardio"],
          low:      ["Push", "Cardio", "Pull", "Rest", "Legs", "Cardio", "Rest"],
        },
        BRO: {
          high:     ["Chest", "Back", "Shoulders", "Legs", "Arms", "Cardio", "Rest"],
          moderate: ["Chest", "Back", "Shoulders", "Rest", "Legs", "Arms", "Cardio"],
          low:      ["Chest", "Back", "Cardio", "Legs", "Rest", "Arms", "Rest"],
        },
      };

      const sched = plans[splitType][tier].map((type) => ({
        type,
        lift: type !== "Rest" && type !== "Cardio",
        rest: type === "Rest",
        cardio: type === "Cardio",
      }));

      return { schedule: sched, tier };
    }

    function getScheduleRationale(weeklyTargetKg, tier, sessionCount, cardioCount) {
      const trainingBurn = sessionCount * 280; // ~280 kcal/session avg
      const cardioBurn = cardioCount * 320;
      const totalWeeklyBurn = trainingBurn + cardioBurn;
      if (tier === "high") {
        return `Your ${weeklyTargetKg.toFixed(2)} kg/week target is aggressive — this plan packs ${sessionCount} lifting sessions${cardioCount ? ` + ${cardioCount} cardio` : ""} (~${totalWeeklyBurn} kcal training burn) to support the deficit while preserving muscle.`;
      }
      if (tier === "moderate") {
        return `${sessionCount} lifts${cardioCount ? ` + ${cardioCount} cardio` : ""} = ~${totalWeeklyBurn} kcal of weekly training burn. Right-sized for your ${weeklyTargetKg.toFixed(2)} kg/week target — sustainable, builds the habit.`;
      }
      return `Gentle pace — ${sessionCount} lifts${cardioCount ? ` + ${cardioCount} cardio` : ""} (~${totalWeeklyBurn} kcal/week). At ${weeklyTargetKg.toFixed(2)} kg/week, fat loss is mostly nutrition-driven; train to keep muscle and feel strong.`;
    }

    // Returns ISO date string for Monday of the current ISO week
    function getMondayOfWeek(d = new Date()) {
      const dt = new Date(d);
      const day = dt.getDay() || 7; // Sunday → 7
      if (day !== 1) dt.setHours(-24 * (day - 1));
      return dt.toISOString().slice(0, 10);
    }

    // ============ WEEKLY VOLUME CARD ============
    // Shows sets-per-muscle-group for the user's current weekly schedule.
    // Color-coded by MEV/MAV/MRV — under, optimal, over.
    function WeeklyVolumeCard({ profile, splitType }) {
      const [showInfo, setShowInfo] = useState(false);

      const totalLoss = Math.max(0.5, profile.startWeight - profile.goalWeight);
      const weeklyTarget = totalLoss / (profile.durationDays / 7);
      const tier = weeklyTarget > 0.7 ? "high" : weeklyTarget >= 0.4 ? "moderate" : "low";

      const plans = {
        PPL: {
          high:     ["Push", "Pull", "Legs", "Push", "Pull", "Legs", "Rest"],
          moderate: ["Push", "Pull", "Legs", "Rest", "Push", "Pull", "Cardio"],
          low:      ["Push", "Cardio", "Pull", "Rest", "Legs", "Cardio", "Rest"],
        },
        BRO: {
          high:     ["Chest", "Back", "Shoulders", "Legs", "Arms", "Cardio", "Rest"],
          moderate: ["Chest", "Back", "Shoulders", "Rest", "Legs", "Arms", "Cardio"],
          low:      ["Chest", "Back", "Cardio", "Legs", "Rest", "Arms", "Rest"],
        },
      };
      const week = plans[splitType][tier];

      const volume = useMemo(() => calculateWeeklyVolume(splitType, tier, week), [splitType, tier]);

      // Order muscles for display — primary movers first
      const order = ["chest", "back", "shoulders", "biceps", "triceps", "quads", "hamstrings", "glutes", "calves", "core"];
      const muscleEntries = order
        .filter((m) => volume[m] !== undefined && volume[m] > 0)
        .map((m) => ({ muscle: m, sets: volume[m], status: volumeStatusFor(m, volume[m]) }));

      const totalSets = muscleEntries.reduce((s, e) => s + e.sets, 0);
      const optimalCount = muscleEntries.filter((e) => e.status === "optimal").length;

      return (
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-5">
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="flex items-center gap-1.5">
                <span className="text-zinc-500 text-[10px] uppercase tracking-wider font-bold">Weekly Volume</span>
                <button onClick={() => setShowInfo(true)}
                  className="w-4 h-4 rounded-full bg-zinc-800 text-zinc-500 hover:text-lime-400 text-[9px] font-bold flex items-center justify-center">
                  ?
                </button>
              </div>
              <div className="text-base font-bold text-zinc-100 mt-0.5">
                {Math.round(totalSets)} sets · <span className="text-zinc-500 font-medium">{optimalCount}/{muscleEntries.length} muscles in optimal zone</span>
              </div>
            </div>
            <div className="px-2.5 py-1 rounded-full bg-zinc-800 text-[10px] font-bold uppercase tracking-wider text-zinc-400">
              {tier === "high" ? "MEV-MAV" : tier === "moderate" ? "MAV" : "MAV-MRV"}
            </div>
          </div>

          {/* Volume bars */}
          <div className="space-y-2">
            {muscleEntries.map(({ muscle, sets, status }) => {
              const color = status === "optimal" ? ACCENT : status === "low" ? "#fb923c" : "#ef4444";
              const label = status === "optimal" ? "✓ Optimal" : status === "low" ? "↑ Add more" : "↓ Too much";
              // Bar fill: 22 sets = 100% (the MRV ceiling for chest/back). Other muscles will look fuller earlier — that's fine.
              const fillPct = Math.min(100, (sets / 22) * 100);
              return (
                <div key={muscle} className="flex items-center gap-2">
                  <div className="w-20 text-xs text-zinc-300 font-semibold capitalize shrink-0">{muscle}</div>
                  <div className="flex-1 h-5 bg-zinc-800 rounded-md overflow-hidden relative">
                    <div className="absolute inset-y-0 left-0 transition-all duration-500 rounded-md"
                      style={{ width: `${fillPct}%`, background: color, opacity: 0.85 }} />
                    <div className="relative z-10 h-full px-2 flex items-center justify-between">
                      <span className="text-[11px] font-bold mono" style={{ color: fillPct > 30 ? "#0a0a0a" : "#a1a1aa" }}>
                        {sets} sets
                      </span>
                      <span className="text-[9px] font-bold uppercase tracking-wider" style={{ color: fillPct > 50 ? "#0a0a0a" : color }}>
                        {label}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Educational info modal */}
          {showInfo && (
            <Modal onClose={() => setShowInfo(false)} title="How weekly volume works">
              <div className="space-y-3 text-sm text-zinc-300">
                <p>
                  <span className="text-zinc-100 font-semibold">Weekly sets per muscle group</span> is the strongest predictor of muscle growth and preservation. Researchers split it into three zones:
                </p>
                <div className="space-y-2 my-3">
                  <div className="flex gap-3 items-start">
                    <div className="w-3 h-3 rounded-full mt-1 shrink-0" style={{ background: "#fb923c" }} />
                    <div>
                      <div className="font-semibold text-orange-300">Below MEV</div>
                      <div className="text-xs text-zinc-400">Minimum Effective Volume — under this, you'll lose muscle in a cut. Add more sets.</div>
                    </div>
                  </div>
                  <div className="flex gap-3 items-start">
                    <div className="w-3 h-3 rounded-full mt-1 shrink-0" style={{ background: ACCENT }} />
                    <div>
                      <div className="font-semibold text-lime-300">Optimal (MAV zone)</div>
                      <div className="text-xs text-zinc-400">Maximum Adaptive Volume — the sweet spot for growth and preservation. Most muscles grow best at 10-18 sets/week.</div>
                    </div>
                  </div>
                  <div className="flex gap-3 items-start">
                    <div className="w-3 h-3 rounded-full mt-1 shrink-0" style={{ background: "#ef4444" }} />
                    <div>
                      <div className="font-semibold text-red-300">Above MRV</div>
                      <div className="text-xs text-zinc-400">Maximum Recoverable Volume — beyond this, recovery suffers (worse in a calorie deficit). Drop a set or two.</div>
                    </div>
                  </div>
                </div>
                <p className="text-xs text-zinc-500 pt-2 border-t border-zinc-800">
                  Your plan sits at <span className="text-zinc-300 font-semibold">{tier === "high" ? "MEV-MAV (lower volume)" : tier === "moderate" ? "MAV (sweet spot)" : "MAV-MRV (higher volume)"}</span> — best for {tier === "high" ? "aggressive cuts where recovery is harder" : tier === "moderate" ? "balanced fat loss with muscle maintenance" : "gradual cuts where you can push more volume"}.
                </p>
                <p className="text-[10px] text-zinc-600 leading-relaxed">
                  Sources: Schoenfeld et al. (2017, 2019), Israetel et al., Helms et al. (Volume-Hypertrophy meta-analyses)
                </p>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ============ WEEKLY SCHEDULE CARD ============
    function WeeklyScheduleCard({ profile, splitType, workouts, onStartDay }) {
      const totalLoss = Math.max(0.5, profile.startWeight - profile.goalWeight);
      const weeklyTarget = totalLoss / (profile.durationDays / 7);
      const { schedule, tier } = useMemo(
        () => getWeeklySchedule(splitType, weeklyTarget),
        [splitType, weeklyTarget]
      );

      const todayStr = todayKey();
      const monday = useMemo(() => getMondayOfWeek(), []);

      // Build day-by-day view for current week
      const days = useMemo(() => {
        return schedule.map((entry, i) => {
          const d = new Date(monday + "T00:00:00");
          d.setDate(d.getDate() + i);
          const dateStr = d.toISOString().slice(0, 10);
          const completed = workouts.find((w) => w.date === dateStr && w.day === entry.type);
          const isToday = dateStr === todayStr;
          const isPast = dateStr < todayStr;
          return {
            ...entry,
            dateStr,
            dayLabel: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"][i],
            completed,
            isToday,
            isPast,
          };
        });
      }, [schedule, monday, workouts, todayStr]);

      const sessionCount = schedule.filter((s) => s.lift).length;
      const cardioCount = schedule.filter((s) => s.cardio).length;
      const completedThisWeek = days.filter((d) => d.completed).length;
      const tierColor = tier === "high" ? "#fb923c" : tier === "moderate" ? "#a3e635" : "#38bdf8";
      const tierLabel = tier === "high" ? "Aggressive" : tier === "moderate" ? "Moderate" : "Gradual";

      const today = days.find((d) => d.isToday);

      return (
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-5 relative overflow-hidden">
          <div className="absolute -right-12 -top-12 w-32 h-32 rounded-full opacity-10 blur-3xl"
            style={{ background: tierColor }} />

          <div className="relative z-10">
            <div className="flex items-start justify-between mb-3">
              <div>
                <div className="text-zinc-500 text-[10px] uppercase tracking-wider font-semibold">This week's plan</div>
                <div className="text-base font-bold text-zinc-100 mt-0.5">
                  {sessionCount} lifts{cardioCount ? ` + ${cardioCount} cardio` : ""}
                  <span className="text-xs text-zinc-500 font-medium ml-1.5">· {completedThisWeek}/{sessionCount} done</span>
                </div>
              </div>
              <div className="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"
                style={{ background: `${tierColor}1a`, color: tierColor }}>
                {tierLabel}
              </div>
            </div>

            {/* 7-day strip */}
            <div className="grid grid-cols-7 gap-1.5 mb-3">
              {days.map((d, i) => {
                const lifting = d.lift;
                const isRest = d.rest;
                const isCardio = d.cardio;
                const done = !!d.completed;
                const missed = d.isPast && lifting && !done;
                return (
                  <button
                    key={i}
                    onClick={() => lifting && onStartDay(d.type)}
                    disabled={!lifting}
                    className={`flex flex-col items-center py-2 px-1 rounded-xl border text-center transition relative ${
                      d.isToday ? "border-lime-400" : "border-zinc-800"
                    } ${lifting ? "hover:border-lime-400/60 active:scale-95" : "cursor-default"} ${
                      done ? "bg-lime-400/10" : missed ? "bg-orange-400/5" : ""
                    }`}
                  >
                    <span className={`text-[9px] font-bold uppercase tracking-wider ${
                      d.isToday ? "text-lime-400" : "text-zinc-500"
                    }`}>
                      {d.dayLabel}

    // ============ WORKOUT SCREEN ============
    function WorkoutScreen({ profile, workouts, setWorkouts, setProfile, desktop = false }) {
      const [splitType, setSplitType] = useState(profile.splitType || "PPL");
      const [activeDay, setActiveDay] = useState(null); // e.g. "Push", "Chest"
      const [editingWorkout, setEditingWorkout] = useState(null);

      useEffect(() => {
        if (splitType !== profile.splitType) setProfile({ ...profile, splitType });
      }, [splitType]);

      const today = todayKey();
      const todayWorkout = workouts.find(w => w.date === today);

      const days = splitType === "PPL" ? Object.keys(PPL_EXERCISES) : Object.keys(BRO_EXERCISES);

      // Adherence
      const last14 = useMemo(() => {
        return Array.from({ length: 14 }, (_, i) => {
          const d = new Date(Date.now() - (13 - i) * 86400000).toISOString().slice(0, 10);
          return { date: d, has: workouts.some(w => w.date === d) };
        });
      }, [workouts]);
      const adherence = Math.round((last14.filter(d => d.has).length / 14) * 100);

      const startWorkout = (day) => {
        const list = splitType === "PPL" ? PPL_EXERCISES[day] : BRO_EXERCISES[day];

        // Get personalized prescription based on weekly fat-loss target
        const totalLoss = Math.max(0.5, profile.startWeight - profile.goalWeight);
        const weeklyTarget = totalLoss / (profile.durationDays / 7);
        const tier = weeklyTarget > 0.7 ? "high" : weeklyTarget >= 0.4 ? "moderate" : "low";
        const prescription = getDayPrescription(splitType, day, tier);

        // Map prescription to actual exercise objects + initial set rows
        const picked = prescription
          .map((rx) => {
            const ex = list.find((e) => e.name === rx.name);
            if (!ex) return null;
            // Parse "8-10" → use the lower number as the initial rep target
            const repTarget = parseInt(String(rx.reps).split("-")[0]) || 10;
            // Look up last performed weight; otherwise suggest based on bodyweight
            const lastSets = (() => {
              for (let i = workouts.length - 1; i >= 0; i--) {
                const past = workouts[i];
                const found = past.exercises?.find((e) => e.name === ex.name);
                if (found?.sets?.length) {
                  const top = found.sets.reduce((b, s) =>
                    (s.weight || 0) * (s.reps || 0) > (b.weight || 0) * (b.reps || 0) ? s : b, found.sets[0]);
                  return { weight: top.weight, reps: top.reps };
                }
              }
              return null;
            })();
            const startWeight = lastSets?.weight ?? suggestStartWeight(ex.name, profile.weight);
            const startReps = lastSets?.reps ?? repTarget;
            // Build N empty sets as prescribed
            const sets = Array.from({ length: rx.sets }, () => ({ reps: startReps, weight: startWeight }));
            return {
              name: ex.name,
              eq: ex.eq,
              targetReps: rx.reps,
              rest: rx.rest,
              sets,
            };
          })
          .filter(Boolean);

        const newW = {
          id: Date.now(),
          date: today,
          split: splitType,
          day,
          exercises: picked,
          duration: 0,
          startTime: Date.now(),
        };
        setEditingWorkout(newW);
      };

      if (editingWorkout) {
        return <WorkoutLogger
          workout={editingWorkout}
          allWorkouts={workouts}
          splitType={splitType}
          profile={profile}
          onSave={(w) => {
            const filtered = workouts.filter(x => x.id !== w.id);
            setWorkouts([...filtered, w]);
            setEditingWorkout(null);
          }}
          onCancel={() => setEditingWorkout(null)} />;
      }

      return (
        <div className={desktop ? "fade-in" : "px-5 pt-5 fade-in"}>
          <h1 className="text-2xl lg:text-3xl font-bold text-zinc-100 mb-1">Workouts</h1>
          <p className="text-zinc-500 text-sm mb-5">Pick a split, hit the gym, track progress.</p>

          {/* Split selector */}
          <div className="flex gap-2 mb-5 bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
            {[
              { key: "PPL", label: "Push / Pull / Legs", desc: "3-day split" },
              { key: "BRO", label: "Bro Split", desc: "5-day split" }
            ].map(s => (
              <button key={s.key} onClick={() => setSplitType(s.key)}
                className={`flex-1 py-3 rounded-xl text-sm font-semibold transition ${
                  splitType === s.key ? "bg-lime-400 text-zinc-900" : "text-zinc-400"
                }`}>
                {s.label}
              </button>
            ))}
          </div>

          {/* Weekly plan */}
          <WeeklyScheduleCard
            profile={profile}
            splitType={splitType}
            workouts={workouts}
            onStartDay={startWorkout}
          />

          {/* Weekly volume per muscle group */}
          <WeeklyVolumeCard profile={profile} splitType={splitType} />

          {/* Today */}
          {todayWorkout && (() => {
            const tSets = todayWorkout.exercises.reduce((s, ex) => s + (ex.sets?.length || 0), 0);
            const tBurn = estimateWorkoutBurn({
              durationMin: todayWorkout.duration || Math.round(tSets * 2.5 + 5),
              totalSets: tSets,
              bodyweight: profile.weight,
            });
            return (
            <Card className="mb-4 border-lime-500/30 bg-lime-400/5">
              <div className="flex items-center gap-2 mb-1">
                <Check className="w-4 h-4 text-lime-400" />
                <span className="text-lime-300 text-xs uppercase tracking-wider font-semibold">Logged today</span>
              </div>
              <div className="text-zinc-100 font-bold text-lg">{todayWorkout.day} day</div>
              <div className="text-xs text-zinc-500 mt-1 mono">
                {todayWorkout.exercises.length} exercises · {todayWorkout.duration} min · <span className="text-orange-300">~{tBurn} kcal</span>
              </div>
              <button onClick={() => setEditingWorkout(todayWorkout)}
                className="mt-3 text-xs text-lime-400 font-semibold flex items-center gap-1">
                <Edit3 className="w-3 h-3" /> Edit workout
              </button>
            </Card>
            );
          })()}

          {/* Day selector — ad-hoc workout outside the plan */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Or start any session</h2>
          <div className="grid grid-cols-2 lg:grid-cols-3 gap-3 mb-5">
            {days.map(day => {
              const exList = splitType === "PPL" ? PPL_EXERCISES[day] : BRO_EXERCISES[day];
              // Compute estimated burn for THIS day using the personalized prescription
              const totalLoss = Math.max(0.5, profile.startWeight - profile.goalWeight);
              const weeklyTarget = totalLoss / (profile.durationDays / 7);
              const tier = weeklyTarget > 0.7 ? "high" : weeklyTarget >= 0.4 ? "moderate" : "low";
              const dayPrescription = getDayPrescription(splitType, day, tier);
              const estBurn = dayPrescription.length > 0
                ? estimateBurnFromPrescription(dayPrescription, profile.weight)
                : estimateBurnForDay(exList.length, profile.weight);
              return (
                <button key={day} onClick={() => startWorkout(day)}
                  className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-left hover:border-lime-400/50 active:scale-[0.98] transition">
                  <div className="w-10 h-10 rounded-xl bg-lime-400/10 flex items-center justify-center mb-3">
                    <Dumbbell className="w-4 h-4 text-lime-400" />
                  </div>
                  <div className="font-bold text-zinc-100">{day}</div>
                  <div className="text-xs text-zinc-500 mt-0.5 mono">{exList.length}+ exercises</div>
                  <div className="flex items-center gap-1 mt-2 text-[11px] text-orange-300/90 mono">
                    <Flame className="w-3 h-3" />
                    ~{estBurn} kcal
                  </div>
                </button>
              );
            })}
          </div>

          {/* 14-day consistency */}
          <Card className="mb-4">
            <div className="flex justify-between items-center mb-3">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">14-day adherence</div>
                <div className="text-2xl font-bold text-zinc-100 mono mt-1">{adherence}%</div>
              </div>
              <div className={`px-3 py-1.5 rounded-full text-xs font-semibold ${
                adherence >= 50 ? "bg-lime-400/15 text-lime-300" : "bg-orange-400/15 text-orange-300"
              }`}>
                {adherence >= 70 ? "Excellent" : adherence >= 50 ? "On track" : "Pick it up"}
              </div>
            </div>
            <div className="flex gap-1">
              {last14.map((d, i) => (
                <div key={i} className="flex-1 aspect-square rounded-md transition"
                  style={{ background: d.has ? ACCENT : "#27272a" }} title={d.date} />
              ))}
            </div>
            <div className="flex justify-between text-xs text-zinc-600 mt-2 mono">
              <span>14d ago</span><span>Today</span>
            </div>
          </Card>

          {/* History */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Recent</h2>
          {workouts.slice(-5).reverse().map(w => (
            <div key={w.id} className="bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 mb-2 flex items-center gap-3">
              <div className="w-9 h-9 rounded-lg bg-lime-400/10 flex items-center justify-center">
                <Dumbbell className="w-4 h-4 text-lime-400" />
              </div>
              <div className="flex-1">
                <div className="text-zinc-100 text-sm font-semibold">{w.day} · {w.split}</div>
                <div className="text-xs text-zinc-500 mono">{fmtDate(w.date)} · {w.exercises.length} exercises · {w.duration}min</div>
              </div>
              <button onClick={() => setEditingWorkout(w)}>
                <Edit3 className="w-4 h-4 text-zinc-600" />
              </button>
            </div>
          ))}
          {workouts.length === 0 && (
            <div className="text-center text-zinc-600 text-sm py-8">No workouts yet — start your first session above.</div>
          )}
        </div>
      );
    }

    // ============ WORKOUT LOGGER ============
    function WorkoutLogger({ workout, allWorkouts = [], splitType = "PPL", profile, onSave, onCancel }) {
      const [w, setW] = useState(workout);
      const [duration, setDuration] = useState(workout.duration || 45);
      const [showPicker, setShowPicker] = useState(false);
      const [restTimer, setRestTimer] = useState(null); // { secondsLeft, total, exIdx, setIdx }
      const [finisher, setFinisher] = useState(workout.finisher || null); // selected finisher object
      const [showFinisherPicker, setShowFinisherPicker] = useState(false);
      const [completionScreen, setCompletionScreen] = useState(null); // shown after Save
      const [exerciseInfo, setExerciseInfo] = useState(null); // shown when user taps the info icon

      // Rest timer countdown
      useEffect(() => {
        if (!restTimer || restTimer.secondsLeft <= 0) return;
        const id = setInterval(() => {
          setRestTimer((rt) => {
            if (!rt) return null;
            if (rt.secondsLeft <= 1) {
              // Beep when timer ends — try Web Audio API; fall back silently if unavailable.
              try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = 880;
                g.gain.setValueAtTime(0.2, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                o.start(); o.stop(ctx.currentTime + 0.4);
              } catch (e) { /* silent */ }
              if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
              return null;
            }
            return { ...rt, secondsLeft: rt.secondsLeft - 1 };
          });
        }, 1000);
        return () => clearInterval(id);
      }, [restTimer]);

      // "Last performed" lookup — find the most recent prior workout that had this exercise.
      const lastPerformedFor = (exerciseName) => {
        for (let i = allWorkouts.length - 1; i >= 0; i--) {
          const past = allWorkouts[i];
          if (past.id === w.id) continue;
          const ex = past.exercises?.find((e) => e.name === exerciseName);
          if (ex && ex.sets?.length) {
            const top = ex.sets.reduce((b, s) =>
              (s.weight || 0) * (s.reps || 0) > (b.weight || 0) * (b.reps || 0) ? s : b, ex.sets[0]);
            const daysAgo = Math.max(0, Math.floor((Date.now() - new Date(past.date).getTime()) / 86400000));
            return { weight: top.weight, reps: top.reps, daysAgo };
          }
        }
        return null;
      };

      const updateSet = (exIdx, setIdx, field, val) => {
        const newEx = [...w.exercises];
        newEx[exIdx].sets[setIdx] = { ...newEx[exIdx].sets[setIdx], [field]: +val };
        setW({ ...w, exercises: newEx });
      };

      const bumpWeight = (exIdx, setIdx, delta) => {
        const newEx = [...w.exercises];
        const cur = +newEx[exIdx].sets[setIdx].weight || 0;
        newEx[exIdx].sets[setIdx] = { ...newEx[exIdx].sets[setIdx], weight: Math.max(0, +(cur + delta).toFixed(2)) };
        setW({ ...w, exercises: newEx });
      };

      const addSet = (exIdx) => {
        const newEx = [...w.exercises];
        const last = newEx[exIdx].sets[newEx[exIdx].sets.length - 1] || { reps: 10, weight: 0 };
        newEx[exIdx].sets.push({ ...last });
        setW({ ...w, exercises: newEx });
      };

      const removeSet = (exIdx, setIdx) => {
        const newEx = [...w.exercises];
        if (newEx[exIdx].sets.length > 1) {
          newEx[exIdx].sets.splice(setIdx, 1);
          setW({ ...w, exercises: newEx });
        }
      };

      const removeExercise = (exIdx) => {
        setW({ ...w, exercises: w.exercises.filter((_, i) => i !== exIdx) });
      };

      const addExercise = (ex) => {
        const last = lastPerformedFor(ex.name);
        setW({
          ...w,
          exercises: [
            ...w.exercises,
            { name: ex.name, eq: ex.eq, sets: [{ reps: last?.reps || 10, weight: last?.weight || 0 }] },
          ],
        });
        setShowPicker(false);
      };

      const moveExercise = (exIdx, dir) => {
        const newIdx = exIdx + dir;
        if (newIdx < 0 || newIdx >= w.exercises.length) return;
        const newEx = [...w.exercises];
        [newEx[exIdx], newEx[newIdx]] = [newEx[newIdx], newEx[exIdx]];
        setW({ ...w, exercises: newEx });
      };

      const totalVolume = w.exercises.reduce((s, ex) =>
        s + ex.sets.reduce((sv, set) => sv + set.reps * set.weight, 0), 0);

      // Available exercise pool depends on the split + day
      const availablePool = useMemo(() => {
        if (splitType === "PPL") return PPL_EXERCISES[w.day] || [];
        return BRO_EXERCISES[w.day] || [];
      }, [splitType, w.day]);

      return (
        <div className="px-5 pt-5 lg:px-0 lg:pt-0 lg:max-w-2xl fade-in">
          <div className="flex items-center justify-between mb-1">
            <button onClick={onCancel} className="text-zinc-500 flex items-center gap-1 text-sm">
              <ChevronLeft className="w-4 h-4" /> Back
            </button>
            <button onClick={() => {
              // Compute burn and show completion screen first; the save happens when user dismisses.
              const totalSets = w.exercises.reduce((s, ex) => s + ex.sets.length, 0);
              const completedSets = w.exercises.reduce((s, ex) => s + ex.sets.filter(set => set.done).length, 0);
              const totalVol = w.exercises.reduce((s, ex) => s + ex.sets.reduce((sv, set) => sv + (set.reps || 0) * (set.weight || 0), 0), 0);
              const finisherKcal = finisher?.kcal || 0;
              const burn = estimateWorkoutBurn({
                durationMin: duration,
                totalSets,
                bodyweight: profile?.weight || 75,
                finisherKcal,
              });
              setCompletionScreen({ burn, totalSets, completedSets, totalVol, finisher });
            }}
              className="px-4 py-2 rounded-xl font-bold text-zinc-900 text-sm flex items-center gap-1.5"
              style={{ background: ACCENT }}>
              <Check className="w-3.5 h-3.5" /> Finish
            </button>
          </div>

          <h1 className="text-2xl font-bold text-zinc-100 mt-2">{w.day} day</h1>
          <p className="text-zinc-500 text-sm mb-4">{w.split} split · {fmtDate(w.date)}</p>

          {/* Stats */}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-5">
            <Card><div className="text-xs text-zinc-500 uppercase tracking-wider">Volume</div><div className="text-lg font-bold text-zinc-100 mono">{Math.round(totalVolume)} <span className="text-xs text-zinc-500">kg</span></div></Card>
            <Card><div className="text-xs text-zinc-500 uppercase tracking-wider">Sets</div><div className="text-lg font-bold text-zinc-100 mono">{w.exercises.reduce((s, ex) => s + ex.sets.length, 0)}</div></Card>
            <Card>
              <div className="text-xs text-zinc-500 uppercase tracking-wider">Time</div>
              <input type="number" value={duration} onChange={e => setDuration(+e.target.value)}
                className="text-lg font-bold text-zinc-100 mono bg-transparent w-full outline-none" />
            </Card>
            <Card>
              <div className="text-xs text-zinc-500 uppercase tracking-wider flex items-center gap-1">
                <Flame className="w-3 h-3 text-orange-400" /> Burn
              </div>
              <div className="text-lg font-bold text-orange-300 mono">
                ~{estimateWorkoutBurn({
                  durationMin: duration || Math.round(w.exercises.reduce((s, ex) => s + ex.sets.length, 0) * 2.5 + 5),
                  totalSets: w.exercises.reduce((s, ex) => s + ex.sets.length, 0),
                  bodyweight: profile?.weight || 75,
                  finisherKcal: finisher?.kcal || 0,
                })} <span className="text-xs text-zinc-500">kcal</span>
              </div>
            </Card>
          </div>

          {/* Exercises */}
          {w.exercises.map((ex, exIdx) => {
            const last = lastPerformedFor(ex.name);
            const eqColor = EQ_COLOR[ex.eq] || "#a3e635";
            return (
              <div key={exIdx} className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-3">
                <div className="flex items-start justify-between mb-1">
                  <div className="flex items-start gap-2.5 flex-1 min-w-0">
                    <div className="w-1 self-stretch rounded-full mt-0.5" style={{ background: eqColor }} />
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-1.5">
                        <div className="font-bold text-zinc-100 leading-tight">{ex.name}</div>
                        <button onClick={() => setExerciseInfo(ex)}
                          className="text-zinc-500 hover:text-lime-400 active:scale-90 p-0.5 transition shrink-0"
                          title="View tutorial & form references">
                          <Info className="w-3.5 h-3.5" />
                        </button>
                      </div>

                  <Play className="w-5 h-5 text-red-400" fill="currentColor" />

                <div className="flex-1 text-left min-w-0">

              <a href={`https://www.google.com/search?q=${encodeURIComponent(exerciseInfo.name + " exercise form")}&tbm=isch`}

                <div className="flex-1 text-left min-w-0">
                  <div className="text-zinc-100 font-bold text-sm">View reference images</div>
                  <div className="text-[11px] text-zinc-500">Form & muscle anatomy</div>
                </div>
                <ExternalLink className="w-4 h-4 text-zinc-500 shrink-0" />
              </a>

              <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(exerciseInfo.name + " common mistakes")}`}
                target="_blank" rel="noopener noreferrer"
                className="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl bg-amber-500/10 border border-amber-500/30 hover:bg-amber-500/20 active:scale-[0.99] transition">

              <p className="text-[10px] text-zinc-600 mt-5 text-center leading-relaxed">

              profile={profile}
              dayName={w.day}
              duration={duration}
              onDone={() => {
                onSave({ ...w, duration, finisher });
                setCompletionScreen(null);
              }}
            />
          )}
        </div>
      );
