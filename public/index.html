    // ============ WEEKLY SCHEDULE ENGINE ============
    // Returns a 7-entry plan (Mon..Sun) tuned to the user's weekly weight-loss target.
    // Each entry: { type: "Push"|"Pull"|...|"Cardio"|"Rest", lift: bool }
    function getWeeklySchedule(splitType, weeklyTargetKg) {
      const tier = weeklyTargetKg > 0.7 ? "high" : weeklyTargetKg >= 0.4 ? "moderate" : "low";

      const plans = {
        PPL: {
          high:     ["Push", "Pull", "Legs", "Push", "Pull", "Legs", "Rest"],
          moderate: ["Push", "Pull", "Legs", "Rest", "Push", "Pull", "Cardio"],
          low:      ["Push", "Cardio", "Pull", "Rest", "Legs", "Cardio", "Rest"],
        },
        BRO: {
          high:     ["Chest", "Back", "Shoulders", "Legs", "Arms", "Cardio", "Rest"],
          moderate: ["Chest", "Back", "Shoulders", "Rest", "Legs", "Arms", "Cardio"],
          low:      ["Chest", "Back", "Cardio", "Legs", "Rest", "Arms", "Rest"],
        },
      };

      const sched = plans[splitType][tier].map((type) => ({
        type,
        lift: type !== "Rest" && type !== "Cardio",
        rest: type === "Rest",
        cardio: type === "Cardio",
      }));

      return { schedule: sched, tier };
    }

    function getScheduleRationale(weeklyTargetKg, tier, sessionCount, cardioCount) {
      const trainingBurn = sessionCount * 280; // ~280 kcal/session avg
      const cardioBurn = cardioCount * 320;
      const totalWeeklyBurn = trainingBurn + cardioBurn;
      if (tier === "high") {
        return `Your ${weeklyTargetKg.toFixed(2)} kg/week target is aggressive — this plan packs ${sessionCount} lifting sessions${cardioCount ? ` + ${cardioCount} cardio` : ""} (~${totalWeeklyBurn} kcal training burn) to support the deficit while preserving muscle.`;
      }
      if (tier === "moderate") {
        return `${sessionCount} lifts${cardioCount ? ` + ${cardioCount} cardio` : ""} = ~${totalWeeklyBurn} kcal of weekly training burn. Right-sized for your ${weeklyTargetKg.toFixed(2)} kg/week target — sustainable, builds the habit.`;
      }
      return `Gentle pace — ${sessionCount} lifts${cardioCount ? ` + ${cardioCount} cardio` : ""} (~${totalWeeklyBurn} kcal/week). At ${weeklyTargetKg.toFixed(2)} kg/week, fat loss is mostly nutrition-driven; train to keep muscle and feel strong.`;
    }

    // Returns ISO date string for Monday of the current ISO week
    function getMondayOfWeek(d = new Date()) {
      const dt = new Date(d);
      const day = dt.getDay() || 7; // Sunday → 7
      if (day !== 1) dt.setHours(-24 * (day - 1));
      return dt.toISOString().slice(0, 10);
    }

    // ============ WEEKLY SCHEDULE CARD ============
    function WeeklyScheduleCard({ profile, splitType, workouts, onStartDay }) {
      const totalLoss = Math.max(0.5, profile.startWeight - profile.goalWeight);
      const weeklyTarget = totalLoss / (profile.durationDays / 7);
      const { schedule, tier } = useMemo(
        () => getWeeklySchedule(splitType, weeklyTarget),
        [splitType, weeklyTarget]
      );

      const todayStr = todayKey();
      const monday = useMemo(() => getMondayOfWeek(), []);

      // Build day-by-day view for current week
      const days = useMemo(() => {
        return schedule.map((entry, i) => {
          const d = new Date(monday + "T00:00:00");
          d.setDate(d.getDate() + i);
          const dateStr = d.toISOString().slice(0, 10);
          const completed = workouts.find((w) => w.date === dateStr && w.day === entry.type);
          const isToday = dateStr === todayStr;
          const isPast = dateStr < todayStr;
          return {
            ...entry,
            dateStr,
            dayLabel: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"][i],
            completed,
            isToday,
            isPast,
          };
        });
      }, [schedule, monday, workouts, todayStr]);

      const sessionCount = schedule.filter((s) => s.lift).length;
      const cardioCount = schedule.filter((s) => s.cardio).length;
      const completedThisWeek = days.filter((d) => d.completed).length;
      const tierColor = tier === "high" ? "#fb923c" : tier === "moderate" ? "#a3e635" : "#38bdf8";
      const tierLabel = tier === "high" ? "Aggressive" : tier === "moderate" ? "Moderate" : "Gradual";

      const today = days.find((d) => d.isToday);

      return (
        <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-5 relative overflow-hidden">
          <div className="absolute -right-12 -top-12 w-32 h-32 rounded-full opacity-10 blur-3xl"
            style={{ background: tierColor }} />

          <div className="relative z-10">
            <div className="flex items-start justify-between mb-3">
              <div>
                <div className="text-zinc-500 text-[10px] uppercase tracking-wider font-semibold">This week's plan</div>
                <div className="text-base font-bold text-zinc-100 mt-0.5">
                  {sessionCount} lifts{cardioCount ? ` + ${cardioCount} cardio` : ""}
                  <span className="text-xs text-zinc-500 font-medium ml-1.5">· {completedThisWeek}/{sessionCount} done</span>
                </div>
              </div>
              <div className="px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"
                style={{ background: `${tierColor}1a`, color: tierColor }}>
                {tierLabel}
              </div>
            </div>

            {/* 7-day strip */}
            <div className="grid grid-cols-7 gap-1.5 mb-3">
              {days.map((d, i) => {
                const lifting = d.lift;
                const isRest = d.rest;
                const isCardio = d.cardio;
                const done = !!d.completed;
                const missed = d.isPast && lifting && !done;
                return (
                  <button
                    key={i}
                    onClick={() => lifting && onStartDay(d.type)}
                    disabled={!lifting}
                    className={`flex flex-col items-center py-2 px-1 rounded-xl border text-center transition relative ${
                      d.isToday ? "border-lime-400" : "border-zinc-800"
                    } ${lifting ? "hover:border-lime-400/60 active:scale-95" : "cursor-default"} ${
                      done ? "bg-lime-400/10" : missed ? "bg-orange-400/5" : ""
                    }`}
                  >
                    <span className={`text-[9px] font-bold uppercase tracking-wider ${
                      d.isToday ? "text-lime-400" : "text-zinc-500"
                    }`}>
                      {d.dayLabel}
                    </span>
                    <div className="my-1 flex items-center justify-center w-7 h-7">
                      {done ? (
                        <div className="w-6 h-6 rounded-full bg-lime-400 flex items-center justify-center">
                          <Check className="w-3 h-3 text-zinc-900" strokeWidth={3} />
                        </div>
                      ) : isRest ? (
                        <Heart className="w-3.5 h-3.5 text-zinc-600" />
                      ) : isCardio ? (
                        <Activity className="w-3.5 h-3.5" style={{ color: "#38bdf8" }} />
                      ) : (
                        <Dumbbell className="w-3.5 h-3.5" style={{ color: missed ? "#fb923c" : "#a3e635" }} />
                      )}
                    </div>
                    <span className={`text-[10px] font-semibold leading-tight ${
                      done ? "text-lime-300" : isRest ? "text-zinc-600" : isCardio ? "text-sky-400" : "text-zinc-300"
                    }`}>
                      {d.type === "Cardio" ? "Cardio" : d.type === "Rest" ? "Rest" : d.type}
                    </span>
                  </button>
                );
              })}
            </div>

            {/* Today's CTA */}
            {today && today.lift && !today.completed && (
              <button onClick={() => onStartDay(today.type)}
                className="w-full py-3 rounded-xl font-bold text-zinc-900 flex items-center justify-center gap-2 mb-3"
                style={{ background: ACCENT }}>
                <Zap className="w-4 h-4" /> Start today's {today.type}
              </button>
            )}
            {today && today.cardio && (
              <div className="w-full py-2.5 rounded-xl bg-sky-400/10 border border-sky-400/20 text-center text-sm font-semibold text-sky-300 mb-3">
                Today: 25–40 min cardio (zone 2 / steady)
              </div>
            )}
            {today && today.rest && (
              <div className="w-full py-2.5 rounded-xl bg-zinc-800 text-center text-sm font-semibold text-zinc-400 mb-3">
                Rest day — recovery is when you grow
              </div>
            )}

            {/* Rationale */}
            <p className="text-[11px] text-zinc-500 leading-relaxed">
              {getScheduleRationale(weeklyTarget, tier, sessionCount, cardioCount)}
            </p>
          </div>
        </div>
      );
    }

    // ============ EXERCISE PICKER MODAL ============
    function ExercisePickerModal({ availableExercises, currentNames, onPick, onClose }) {
      const [search, setSearch] = useState("");
      const [eqFilter, setEqFilter] = useState("all");

      const equipmentTypes = useMemo(() => {
        const set = new Set(availableExercises.map((e) => e.eq));
        return ["all", ...Array.from(set)];
      }, [availableExercises]);

      const filtered = availableExercises.filter((ex) => {
        if (currentNames.includes(ex.name)) return false;
        if (eqFilter !== "all" && ex.eq !== eqFilter) return false;
        if (search && !ex.name.toLowerCase().includes(search.toLowerCase())) return false;
        return true;
      });

      return (
        <Modal onClose={onClose} title="Add exercise" fullHeight>
          <input
            autoFocus
            value={search}
            onChange={(e) => setSearch(e.target.value)}
            placeholder="Search exercises..."
            className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 placeholder-zinc-500 focus:border-lime-500 outline-none mb-3"
          />

          <div className="flex gap-1.5 overflow-x-auto scrollbar-hide -mx-1 px-1 pb-2 mb-2">
            {equipmentTypes.map((eq) => (
              <button key={eq} onClick={() => setEqFilter(eq)}
                className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap border transition ${
                  eqFilter === eq
                    ? "bg-lime-400 text-zinc-900 border-lime-400"
                    : "bg-zinc-800 text-zinc-400 border-zinc-700 hover:border-zinc-600"
                }`}>
                {eq === "all" ? "All" : EQ_LABEL[eq]}
              </button>
            ))}
          </div>

          <div className="text-[10px] text-zinc-600 uppercase tracking-wider font-semibold mb-1.5 px-1">
            {filtered.length} available
          </div>

          <div className="overflow-y-auto max-h-[55vh] scrollbar-hide -mx-1 px-1">
            {filtered.length === 0 && (
              <div className="text-center text-zinc-600 text-sm py-8">No exercises match. Try another filter.</div>
            )}
            {filtered.map((ex, i) => (
              <button key={i} onClick={() => onPick(ex)}
                className="w-full flex justify-between items-center p-3 bg-zinc-800 hover:bg-zinc-700 active:scale-[0.99] rounded-xl mb-1.5 text-left transition">
                <div className="flex items-center gap-2.5 min-w-0">
                  <div className="w-1 h-8 rounded-full shrink-0" style={{ background: EQ_COLOR[ex.eq] }} />
                  <div className="min-w-0">
                    <div className="text-sm text-zinc-100 truncate">{ex.name}</div>
                    <div className="text-[10px] text-zinc-500 mt-0.5 flex items-center gap-1.5">
                      <span>{EQ_LABEL[ex.eq]}</span>
                      <span className="text-zinc-700">·</span>
                      <span>{["beginner", "intermediate", "advanced"][ex.lvl - 1]}</span>
                    </div>
                  </div>
                </div>
                <Plus className="w-4 h-4 text-lime-400 shrink-0 ml-2" />
              </button>
            ))}
          </div>
        </Modal>
      );
    }

    // ============ WORKOUT SCREEN ============
    function WorkoutScreen({ profile, workouts, setWorkouts, setProfile }) {
      const [splitType, setSplitType] = useState(profile.splitType || "PPL");
      const [activeDay, setActiveDay] = useState(null); // e.g. "Push", "Chest"
      const [editingWorkout, setEditingWorkout] = useState(null);

      useEffect(() => {
        if (splitType !== profile.splitType) setProfile({ ...profile, splitType });
      }, [splitType]);

      const today = todayKey();
      const todayWorkout = workouts.find(w => w.date === today);

      const days = splitType === "PPL" ? Object.keys(PPL_EXERCISES) : Object.keys(BRO_EXERCISES);

      // Adherence
      const last14 = useMemo(() => {
        return Array.from({ length: 14 }, (_, i) => {
          const d = new Date(Date.now() - (13 - i) * 86400000).toISOString().slice(0, 10);
          return { date: d, has: workouts.some(w => w.date === d) };
        });
      }, [workouts]);
      const adherence = Math.round((last14.filter(d => d.has).length / 14) * 100);

      const startWorkout = (day) => {
        const list = splitType === "PPL" ? PPL_EXERCISES[day] : BRO_EXERCISES[day];
        // Pre-load only the "essentials" — user can add more from the picker.
        const defaults = DEFAULT_WORKOUTS[splitType]?.[day] || [];
        const picked = defaults
          .map((name) => list.find((e) => e.name === name))
          .filter(Boolean);
        const newW = {
          id: Date.now(),
          date: today,
          split: splitType,
          day,
          exercises: picked.map((ex) => ({
            name: ex.name,
            eq: ex.eq,
            sets: [{ reps: 10, weight: 0 }],
          })),
          duration: 0,
          startTime: Date.now(),
        };
        setEditingWorkout(newW);
      };

      if (editingWorkout) {
        return <WorkoutLogger
          workout={editingWorkout}
          allWorkouts={workouts}
          splitType={splitType}
          onSave={(w) => {
            const filtered = workouts.filter(x => x.id !== w.id);
            setWorkouts([...filtered, w]);
            setEditingWorkout(null);
          }}
          onCancel={() => setEditingWorkout(null)} />;
      }

      return (
        <div className="px-5 pt-5 fade-in">
          <h1 className="text-2xl font-bold text-zinc-100 mb-1">Workouts</h1>
          <p className="text-zinc-500 text-sm mb-5">Pick a split, hit the gym, track progress.</p>

          {/* Split selector */}
          <div className="flex gap-2 mb-5 bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
            {[
              { key: "PPL", label: "Push / Pull / Legs", desc: "3-day split" },
              { key: "BRO", label: "Bro Split", desc: "5-day split" }
            ].map(s => (
              <button key={s.key} onClick={() => setSplitType(s.key)}
                className={`flex-1 py-3 rounded-xl text-sm font-semibold transition ${
                  splitType === s.key ? "bg-lime-400 text-zinc-900" : "text-zinc-400"
                }`}>
                {s.label}
              </button>
            ))}
          </div>

          {/* Weekly plan */}
          <WeeklyScheduleCard
            profile={profile}
            splitType={splitType}
            workouts={workouts}
            onStartDay={startWorkout}
          />

          {/* Today */}
          {todayWorkout && (
            <Card className="mb-4 border-lime-500/30 bg-lime-400/5">
              <div className="flex items-center gap-2 mb-1">
                <Check className="w-4 h-4 text-lime-400" />
                <span className="text-lime-300 text-xs uppercase tracking-wider font-semibold">Logged today</span>
              </div>
              <div className="text-zinc-100 font-bold text-lg">{todayWorkout.day} day</div>
              <div className="text-xs text-zinc-500 mt-1 mono">
                {todayWorkout.exercises.length} exercises · {todayWorkout.duration} min
              </div>
              <button onClick={() => setEditingWorkout(todayWorkout)}
                className="mt-3 text-xs text-lime-400 font-semibold flex items-center gap-1">
                <Edit3 className="w-3 h-3" /> Edit workout
              </button>
            </Card>
          )}

          {/* Day selector — ad-hoc workout outside the plan */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Or start any session</h2>
          <div className="grid grid-cols-2 gap-3 mb-5">
            {days.map(day => {
              const exList = splitType === "PPL" ? PPL_EXERCISES[day] : BRO_EXERCISES[day];
              return (
                <button key={day} onClick={() => startWorkout(day)}
                  className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-left hover:border-lime-400/50 active:scale-[0.98] transition">
                  <div className="w-10 h-10 rounded-xl bg-lime-400/10 flex items-center justify-center mb-3">
                    <Dumbbell className="w-4 h-4 text-lime-400" />
                  </div>
                  <div className="font-bold text-zinc-100">{day}</div>
                  <div className="text-xs text-zinc-500 mt-0.5 mono">{exList.length}+ exercises</div>
                </button>
              );
            })}
          </div>

          {/* 14-day consistency */}
          <Card className="mb-4">
            <div className="flex justify-between items-center mb-3">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">14-day adherence</div>
                <div className="text-2xl font-bold text-zinc-100 mono mt-1">{adherence}%</div>
              </div>
              <div className={`px-3 py-1.5 rounded-full text-xs font-semibold ${
                adherence >= 50 ? "bg-lime-400/15 text-lime-300" : "bg-orange-400/15 text-orange-300"
              }`}>
                {adherence >= 70 ? "Excellent" : adherence >= 50 ? "On track" : "Pick it up"}
              </div>
            </div>
            <div className="flex gap-1">
              {last14.map((d, i) => (
                <div key={i} className="flex-1 aspect-square rounded-md transition"
                  style={{ background: d.has ? ACCENT : "#27272a" }} title={d.date} />
              ))}
            </div>
            <div className="flex justify-between text-xs text-zinc-600 mt-2 mono">
              <span>14d ago</span><span>Today</span>
            </div>
          </Card>

          {/* History */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Recent</h2>
          {workouts.slice(-5).reverse().map(w => (
            <div key={w.id} className="bg-zinc-900 border border-zinc-800 rounded-xl p-3.5 mb-2 flex items-center gap-3">
              <div className="w-9 h-9 rounded-lg bg-lime-400/10 flex items-center justify-center">
                <Dumbbell className="w-4 h-4 text-lime-400" />
              </div>
              <div className="flex-1">
                <div className="text-zinc-100 text-sm font-semibold">{w.day} · {w.split}</div>
                <div className="text-xs text-zinc-500 mono">{fmtDate(w.date)} · {w.exercises.length} exercises · {w.duration}min</div>
              </div>
              <button onClick={() => setEditingWorkout(w)}>
                <Edit3 className="w-4 h-4 text-zinc-600" />
              </button>
            </div>
          ))}
          {workouts.length === 0 && (
            <div className="text-center text-zinc-600 text-sm py-8">No workouts yet — start your first session above.</div>
          )}
        </div>
      );
    }

    // ============ WORKOUT LOGGER ============
    function WorkoutLogger({ workout, allWorkouts = [], splitType = "PPL", onSave, onCancel }) {
      const [w, setW] = useState(workout);
      const [duration, setDuration] = useState(workout.duration || 45);
      const [showPicker, setShowPicker] = useState(false);

      // "Last performed" lookup — find the most recent prior workout that had this exercise.
      const lastPerformedFor = (exerciseName) => {
        for (let i = allWorkouts.length - 1; i >= 0; i--) {
          const past = allWorkouts[i];
          if (past.id === w.id) continue;
          const ex = past.exercises?.find((e) => e.name === exerciseName);
          if (ex && ex.sets?.length) {
            const top = ex.sets.reduce((b, s) =>
              (s.weight || 0) * (s.reps || 0) > (b.weight || 0) * (b.reps || 0) ? s : b, ex.sets[0]);
            const daysAgo = Math.max(0, Math.floor((Date.now() - new Date(past.date).getTime()) / 86400000));
            return { weight: top.weight, reps: top.reps, daysAgo };
          }
        }
        return null;
      };

      const updateSet = (exIdx, setIdx, field, val) => {
        const newEx = [...w.exercises];
        newEx[exIdx].sets[setIdx] = { ...newEx[exIdx].sets[setIdx], [field]: +val };
        setW({ ...w, exercises: newEx });
      };

      const bumpWeight = (exIdx, setIdx, delta) => {
        const newEx = [...w.exercises];
        const cur = +newEx[exIdx].sets[setIdx].weight || 0;
        newEx[exIdx].sets[setIdx] = { ...newEx[exIdx].sets[setIdx], weight: Math.max(0, +(cur + delta).toFixed(2)) };
        setW({ ...w, exercises: newEx });
      };

      const addSet = (exIdx) => {
        const newEx = [...w.exercises];
        const last = newEx[exIdx].sets[newEx[exIdx].sets.length - 1] || { reps: 10, weight: 0 };
        newEx[exIdx].sets.push({ ...last });
        setW({ ...w, exercises: newEx });
      };

      const removeSet = (exIdx, setIdx) => {
        const newEx = [...w.exercises];
        if (newEx[exIdx].sets.length > 1) {
          newEx[exIdx].sets.splice(setIdx, 1);
          setW({ ...w, exercises: newEx });
        }
      };

      const removeExercise = (exIdx) => {
        setW({ ...w, exercises: w.exercises.filter((_, i) => i !== exIdx) });
      };

      const addExercise = (ex) => {
        const last = lastPerformedFor(ex.name);
        setW({
          ...w,
          exercises: [
            ...w.exercises,
            { name: ex.name, eq: ex.eq, sets: [{ reps: last?.reps || 10, weight: last?.weight || 0 }] },
          ],
        });
        setShowPicker(false);
      };

      const moveExercise = (exIdx, dir) => {
        const newIdx = exIdx + dir;
        if (newIdx < 0 || newIdx >= w.exercises.length) return;
        const newEx = [...w.exercises];
        [newEx[exIdx], newEx[newIdx]] = [newEx[newIdx], newEx[exIdx]];
        setW({ ...w, exercises: newEx });
      };

      const totalVolume = w.exercises.reduce((s, ex) =>
        s + ex.sets.reduce((sv, set) => sv + set.reps * set.weight, 0), 0);

      // Available exercise pool depends on the split + day
      const availablePool = useMemo(() => {
        if (splitType === "PPL") return PPL_EXERCISES[w.day] || [];
        return BRO_EXERCISES[w.day] || [];
      }, [splitType, w.day]);

      return (
        <div className="px-5 pt-5 fade-in">
          <div className="flex items-center justify-between mb-1">
            <button onClick={onCancel} className="text-zinc-500 flex items-center gap-1 text-sm">
              <ChevronLeft className="w-4 h-4" /> Back
            </button>
            <button onClick={() => onSave({ ...w, duration })}
              className="px-4 py-2 rounded-xl font-bold text-zinc-900 text-sm flex items-center gap-1.5"
              style={{ background: ACCENT }}>
              <Check className="w-3.5 h-3.5" /> Save
            </button>
          </div>

          <h1 className="text-2xl font-bold text-zinc-100 mt-2">{w.day} day</h1>
          <p className="text-zinc-500 text-sm mb-4">{w.split} split · {fmtDate(w.date)}</p>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-2 mb-5">
            <Card><div className="text-xs text-zinc-500 uppercase tracking-wider">Volume</div><div className="text-lg font-bold text-zinc-100 mono">{Math.round(totalVolume)} <span className="text-xs text-zinc-500">kg</span></div></Card>
            <Card><div className="text-xs text-zinc-500 uppercase tracking-wider">Sets</div><div className="text-lg font-bold text-zinc-100 mono">{w.exercises.reduce((s, ex) => s + ex.sets.length, 0)}</div></Card>
            <Card>
              <div className="text-xs text-zinc-500 uppercase tracking-wider">Time</div>
              <input type="number" value={duration} onChange={e => setDuration(+e.target.value)}
                className="text-lg font-bold text-zinc-100 mono bg-transparent w-full outline-none" />
            </Card>
          </div>

          {/* Exercises */}
          {w.exercises.map((ex, exIdx) => {
            const last = lastPerformedFor(ex.name);
            const eqColor = EQ_COLOR[ex.eq] || "#a3e635";
            return (
              <div key={exIdx} className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-3">
                <div className="flex items-start justify-between mb-1">
                  <div className="flex items-start gap-2.5 flex-1 min-w-0">
                    <div className="w-1 self-stretch rounded-full mt-0.5" style={{ background: eqColor }} />
                    <div className="min-w-0 flex-1">
                      <div className="font-bold text-zinc-100 leading-tight">{ex.name}</div>
                      <div className="text-[10px] text-zinc-500 mt-0.5 flex items-center gap-2">
                        {ex.eq && <span>{EQ_LABEL[ex.eq]}</span>}
                        {last ? (
                          <>
                            {ex.eq && <span className="text-zinc-700">·</span>}
                            <span className="mono">Last: {last.weight}kg × {last.reps} ({last.daysAgo === 0 ? "today" : last.daysAgo + "d"})</span>
                          </>
                        ) : (
                          <>
                            {ex.eq && <span className="text-zinc-700">·</span>}
                            <span className="text-zinc-600">First time</span>
                          </>
                        )}
                      </div>
                    </div>
                  </div>
                  <div className="flex items-center gap-0.5 ml-2">
                    <button onClick={() => moveExercise(exIdx, -1)} disabled={exIdx === 0}
                      className="text-zinc-600 hover:text-zinc-300 disabled:opacity-20 p-1">
                      <ChevronLeft className="w-3 h-3 rotate-90" />
                    </button>
                    <button onClick={() => moveExercise(exIdx, 1)} disabled={exIdx === w.exercises.length - 1}
                      className="text-zinc-600 hover:text-zinc-300 disabled:opacity-20 p-1">
                      <ChevronRight className="w-3 h-3 rotate-90" />
                    </button>
                    <button onClick={() => removeExercise(exIdx)} className="text-zinc-600 hover:text-red-400 p-1 ml-1">
                      <Trash2 className="w-3.5 h-3.5" />
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-12 gap-2 text-[10px] text-zinc-600 uppercase tracking-wider font-semibold mb-1.5 px-1 mt-3">
                  <div className="col-span-2">Set</div>
                  <div className="col-span-3">Reps</div>
                  <div className="col-span-6">Weight (kg)</div>
                  <div className="col-span-1"></div>
                </div>

                {ex.sets.map((set, setIdx) => {
                  const isPR = last && (set.weight * set.reps > last.weight * last.reps) && set.weight > 0;
                  return (
                    <div key={setIdx} className="grid grid-cols-12 gap-2 mb-1.5 items-center">
                      <div className="col-span-2 text-zinc-400 text-sm font-bold mono px-1 flex items-center gap-1">
                        #{setIdx + 1}
                        {isPR && <Trophy className="w-3 h-3 text-amber-400" />}
                      </div>
                      <input type="number" inputMode="numeric" value={set.reps}
                        onChange={e => updateSet(exIdx, setIdx, "reps", e.target.value)}
                        className="col-span-3 bg-zinc-800 border border-zinc-700 rounded-lg px-2 py-2 text-zinc-100 mono text-sm focus:border-lime-500 outline-none text-center" />
                      <div className="col-span-6 flex items-center gap-1 bg-zinc-800 border border-zinc-700 rounded-lg overflow-hidden">
                        <button onClick={() => bumpWeight(exIdx, setIdx, -2.5)}
                          className="px-2.5 py-2 text-zinc-400 hover:text-lime-400 active:bg-zinc-700 text-sm font-bold">−</button>
                        <input type="number" inputMode="decimal" step="0.5" value={set.weight}
                          onChange={e => updateSet(exIdx, setIdx, "weight", e.target.value)}
                          className="flex-1 bg-transparent px-1 py-2 text-zinc-100 mono text-sm outline-none text-center min-w-0" />
                        <button onClick={() => bumpWeight(exIdx, setIdx, 2.5)}
                          className="px-2.5 py-2 text-zinc-400 hover:text-lime-400 active:bg-zinc-700 text-sm font-bold">+</button>
                      </div>
                      <button onClick={() => removeSet(exIdx, setIdx)}
                        className="col-span-1 text-zinc-600 hover:text-red-400 flex justify-center">
                        <X className="w-3 h-3" />
                      </button>
                    </div>
                  );
                })}

                <button onClick={() => addSet(exIdx)}
                  className="w-full mt-2 py-2 border border-dashed border-zinc-700 rounded-lg text-zinc-500 text-xs font-semibold hover:border-lime-500 hover:text-lime-400 flex items-center justify-center gap-1">
                  <Plus className="w-3 h-3" /> Add set
                </button>
              </div>
            );
          })}

          {/* Add exercise CTA */}
          <button onClick={() => setShowPicker(true)}
            className="w-full py-3.5 mb-2 rounded-2xl border-2 border-dashed border-zinc-700 hover:border-lime-400 hover:bg-lime-400/5 text-zinc-400 hover:text-lime-400 font-semibold flex items-center justify-center gap-2 transition">
            <Plus className="w-4 h-4" /> Add exercise
            <span className="text-xs text-zinc-600 font-normal">· {availablePool.length - w.exercises.length} options</span>
          </button>

          {showPicker && (
            <ExercisePickerModal
              availableExercises={availablePool}
              currentNames={w.exercises.map((e) => e.name)}
              onPick={addExercise}
              onClose={() => setShowPicker(false)}
            />
          )}
        </div>
      );
    }

    // ============ NUTRITION SCREEN ============
    function NutritionScreen({ profile, meals, setMeals, workouts }) {
      const today = todayKey();
      const [activeMeal, setActiveMeal] = useState(null); // "Breakfast", etc
      const [searchQ, setSearchQ] = useState("");

      // Adherence-aware target
      const last14 = workouts.filter(w => {
        const diff = (Date.now() - new Date(w.date).getTime()) / 86400000;
        return diff <= 14;
      });
      const consistent = last14.length >= 7;
      const tdee = calcTDEE(profile, consistent);
      const totalLoss = profile.startWeight - profile.goalWeight;
      const dailyDeficit = Math.round((totalLoss * KCAL_PER_KG_FAT) / profile.durationDays);
      const calorieTarget = Math.max(1200, tdee - dailyDeficit);
      const proteinTarget = Math.round(profile.weight * 1.8);

      const mealTypes = ["Breakfast", "Lunch", "Dinner", "Snack"];
      const todayMeals = meals.filter(m => m.date === today);

      const totals = todayMeals.reduce((acc, m) => {
        m.foods.forEach(f => {
          acc.cal += f.cal * f.qty;
          acc.p += f.p * f.qty;
          acc.c += (f.c || 0) * f.qty;
          acc.f += (f.f || 0) * f.qty;
        });
        return acc;
      }, { cal: 0, p: 0, c: 0, f: 0 });

      const addFood = (food) => {
        const existing = todayMeals.find(m => m.meal === activeMeal);
        let updated;
        if (existing) {
          updated = meals.map(m =>
            m.id === existing.id ? { ...m, foods: [...m.foods, { ...food, qty: 1 }] } : m
          );
        } else {
          updated = [...meals, { id: Date.now(), date: today, meal: activeMeal, foods: [{ ...food, qty: 1 }] }];
        }
        setMeals(updated);
        setSearchQ("");
      };

      const updateQty = (mealId, foodIdx, delta) => {
        const updated = meals.map(m => {
          if (m.id !== mealId) return m;
          const newFoods = [...m.foods];
          const newQty = +(newFoods[foodIdx].qty + delta).toFixed(1);
          if (newQty <= 0) newFoods.splice(foodIdx, 1);
          else newFoods[foodIdx] = { ...newFoods[foodIdx], qty: newQty };
          return { ...m, foods: newFoods };
        }).filter(m => m.foods.length > 0);
        setMeals(updated);
      };

      const filteredFoods = FOOD_DB.filter(f =>
        f.name.toLowerCase().includes(searchQ.toLowerCase())
      );

      if (profile.noTracking) {
        return (
          <div className="px-5 pt-5 fade-in">
            <h1 className="text-2xl font-bold text-zinc-100 mb-1">Nutrition</h1>
            <p className="text-zinc-500 text-sm mb-5">No-calorie mode is on.</p>

            <Card className="text-center py-8">
              <div className="w-14 h-14 rounded-2xl bg-lime-400/10 flex items-center justify-center mx-auto mb-3">
                <Zap className="w-6 h-6 text-lime-400" />
              </div>
              <div className="font-bold text-zinc-100 mb-1">Tracking made simple</div>
              <p className="text-sm text-zinc-500 mb-4 px-4">
                We'll estimate your intake from your activity and goals. Just keep training.
              </p>
              <div className="text-xs text-zinc-500 uppercase tracking-wider font-semibold mb-1">Daily target estimate</div>
              <div className="text-3xl font-bold text-zinc-100 mono">{calorieTarget} <span className="text-base text-zinc-500">kcal</span></div>
            </Card>
          </div>
        );
      }

      return (
        <div className="px-5 pt-5 fade-in">
          <h1 className="text-2xl font-bold text-zinc-100 mb-1">Nutrition</h1>
          <p className="text-zinc-500 text-sm mb-5">Log meals, hit your macros.</p>

          {/* Macro overview */}
          <div className="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-4">
            <div className="flex justify-between items-baseline mb-1">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">Today</div>
                <div className="flex items-baseline gap-1 mt-1">
                  <span className="text-4xl font-bold text-zinc-100 mono">{Math.round(totals.cal)}</span>
                  <span className="text-zinc-500">/ {calorieTarget} kcal</span>
                </div>
              </div>
            </div>
            <div className="h-2 bg-zinc-800 rounded-full overflow-hidden my-3">
              <div className="h-full transition-all duration-500"
                style={{ width: `${Math.min(100, (totals.cal / calorieTarget) * 100)}%`, background: ACCENT }} />
            </div>
            <div className="grid grid-cols-3 gap-3 mt-4">
              <MacroDot label="Protein" val={totals.p} target={proteinTarget} color="#a3e635" unit="g" />
              <MacroDot label="Carbs" val={totals.c} target={Math.round(calorieTarget * 0.45 / 4)} color="#38bdf8" unit="g" />
              <MacroDot label="Fat" val={totals.f} target={Math.round(calorieTarget * 0.25 / 9)} color="#fb923c" unit="g" />
            </div>
          </div>

          {/* Meals */}
          {mealTypes.map(meal => {
            const mealEntry = todayMeals.find(m => m.meal === meal);
            const cal = mealEntry?.foods.reduce((s, f) => s + f.cal * f.qty, 0) || 0;
            return (
              <div key={meal} className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-3">
                <div className="flex justify-between items-center mb-2">
                  <div className="flex items-center gap-2">
                    <div className="text-base font-bold text-zinc-100">{meal}</div>
                    <div className="text-xs text-zinc-500 mono">{Math.round(cal)} kcal</div>
                  </div>
                  <button onClick={() => setActiveMeal(meal)}
                    className="w-8 h-8 rounded-full bg-lime-400 flex items-center justify-center">
                    <Plus className="w-4 h-4 text-zinc-900" />
                  </button>
                </div>
                {mealEntry?.foods.map((f, i) => (
                  <div key={i} className="flex items-center justify-between py-2 border-t border-zinc-800/60">
                    <div>
                      <div className="text-sm text-zinc-200">{f.name}</div>
                      <div className="text-xs text-zinc-500 mono">{Math.round(f.cal * f.qty)} kcal · {(f.p * f.qty).toFixed(1)}g P</div>
                    </div>
                    <div className="flex items-center gap-1.5">
                      <button onClick={() => updateQty(mealEntry.id, i, -0.5)}
                        className="w-6 h-6 rounded-full bg-zinc-800 text-zinc-400 text-sm">−</button>
                      <span className="w-8 text-center text-sm text-zinc-200 mono">{f.qty}×</span>
                      <button onClick={() => updateQty(mealEntry.id, i, 0.5)}
                        className="w-6 h-6 rounded-full bg-zinc-800 text-zinc-400 text-sm">+</button>
                    </div>
                  </div>
                ))}
                {!mealEntry && (
                  <div className="text-center text-zinc-600 text-xs py-2">No items yet</div>
                )}
              </div>
            );
          })}

          {/* Add food modal */}
          {activeMeal && (
            <Modal onClose={() => { setActiveMeal(null); setSearchQ(""); }} title={`Add to ${activeMeal}`} fullHeight>
              <input value={searchQ} onChange={e => setSearchQ(e.target.value)}
                placeholder="Search food (e.g. chapati, chicken)..."
                className="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-zinc-100 placeholder-zinc-500 focus:border-lime-500 outline-none mb-3" />
              <div className="overflow-y-auto max-h-[55vh] scrollbar-hide">
                {["Indian", "Global"].map(cat => {
                  const items = filteredFoods.filter(f => f.cat === cat);
                  if (!items.length) return null;
                  return (
                    <div key={cat} className="mb-3">
                      <div className="text-xs text-zinc-500 uppercase tracking-wider font-semibold mb-1.5 px-1">{cat}</div>
                      {items.map((f, i) => (
                        <button key={i} onClick={() => addFood(f)}
                          className="w-full flex justify-between items-center p-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl mb-1.5 text-left">
                          <div>
                            <div className="text-sm text-zinc-100">{f.name}</div>
                            <div className="text-xs text-zinc-500 mono">{f.p}g protein</div>
                          </div>
                          <div className="text-sm font-bold text-lime-400 mono">{f.cal} kcal</div>
                        </button>
                      ))}
                    </div>
                  );
                })}
              </div>
            </Modal>
          )}
        </div>
      );
    }

    const MacroDot = ({ label, val, target, color, unit }) => {
      const pct = Math.min(100, (val / target) * 100);
      return (
        <div>
          <div className="flex justify-between items-baseline">
            <span className="text-xs text-zinc-500 font-semibold">{label}</span>
            <span className="text-xs text-zinc-400 mono">{Math.round(val)}<span className="text-zinc-600">/{target}{unit}</span></span>
          </div>
          <div className="h-1.5 bg-zinc-800 rounded-full overflow-hidden mt-1">
            <div className="h-full rounded-full" style={{ width: `${pct}%`, background: color }} />
          </div>
        </div>
      );
    };

    // ============ PROGRESS SCREEN ============
    function ProgressScreen({ profile, weights, workouts, meals }) {
      const last14 = workouts.filter(w => (Date.now() - new Date(w.date).getTime()) / 86400000 <= 14);
      const consistent = last14.length >= 7;
      const tdee = calcTDEE(profile, consistent);
      const totalLoss = profile.startWeight - profile.goalWeight;
      const dailyDeficitTarget = Math.round((totalLoss * KCAL_PER_KG_FAT) / profile.durationDays);

      // Build chart data: predicted vs actual
      const chartData = useMemo(() => {
        const days = profile.durationDays;
        const data = [];
        const startTime = new Date(profile.startDate).getTime();

        for (let i = 0; i <= days; i += Math.max(1, Math.floor(days / 60))) {
          const date = new Date(startTime + i * 86400000).toISOString().slice(0, 10);
          const predicted = +(profile.startWeight - (totalLoss * i) / days).toFixed(2);

          const actualEntry = weights.find(w => w.date === date);
          const closestActual = actualEntry?.weight ?? null;

          data.push({
            date,
            day: i,
            predicted,
            actual: closestActual,
            label: i === 0 ? "Start" : i === days ? "Goal" : ""
          });
        }
        return data;
      }, [profile, weights, totalLoss]);

      const currentWeight = weights.length ? weights[weights.length - 1].weight : profile.startWeight;
      const lostSoFar = profile.startWeight - currentWeight;

      // Daily calorie average over last 7 days
      const last7Cal = useMemo(() => {
        const data = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
          const dayMeals = meals.filter(m => m.date === d);
          const cal = dayMeals.reduce((s, m) => s + m.foods.reduce((sf, f) => sf + f.cal * f.qty, 0), 0);
          data.push({ date: fmtDate(d), cal: Math.round(cal) });
        }
        return data;
      }, [meals]);

      const avgCal = Math.round(last7Cal.reduce((s, d) => s + d.cal, 0) / 7);
      const expectedDailyDeficit = consistent ? dailyDeficitTarget * 1.1 : dailyDeficitTarget * 0.9;
      const expectedWeeklyLoss = (expectedDailyDeficit * 7) / KCAL_PER_KG_FAT;
      const expectedMonthlyLoss = (expectedDailyDeficit * 30) / KCAL_PER_KG_FAT;

      // End-of-week and end-of-month estimates
      const today = new Date();
      const dayOfWeek = today.getDay();
      const daysToEOW = 7 - dayOfWeek;
      const daysToEOM = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate() - today.getDate();
      const eowWeight = +(currentWeight - (expectedDailyDeficit * daysToEOW) / KCAL_PER_KG_FAT).toFixed(1);
      const eomWeight = +(currentWeight - (expectedDailyDeficit * daysToEOM) / KCAL_PER_KG_FAT).toFixed(1);

      return (
        <div className="px-5 pt-5 fade-in">
          <h1 className="text-2xl font-bold text-zinc-100 mb-1">Progress</h1>
          <p className="text-zinc-500 text-sm mb-5">Predicted vs actual.</p>

          {/* Main chart */}
          <Card className="mb-4">
            <div className="flex justify-between items-start mb-4">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">Trajectory</div>
                <div className="text-2xl font-bold text-zinc-100 mono">{currentWeight.toFixed(1)} <span className="text-base text-zinc-500">kg</span></div>
              </div>
              <div className="text-right">
                <div className="text-zinc-500 text-xs">Lost so far</div>
                <div className="text-lg font-bold mono" style={{ color: ACCENT }}>−{lostSoFar.toFixed(1)} kg</div>
              </div>
            </div>
            <div className="h-48">
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={chartData}>
                  <defs>
                    <linearGradient id="predGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={ACCENT} stopOpacity={0.4} />
                      <stop offset="100%" stopColor={ACCENT} stopOpacity={0} />
                    </linearGradient>
                    <linearGradient id="actGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#fff" stopOpacity={0.3} />
                      <stop offset="100%" stopColor="#fff" stopOpacity={0} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="2 4" stroke="#27272a" vertical={false} />
                  <XAxis dataKey="day" tick={{ fill: "#52525b", fontSize: 10 }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill: "#52525b", fontSize: 10 }} axisLine={false} tickLine={false} domain={['dataMin - 1', 'dataMax + 1']} width={28} />
                  <Tooltip contentStyle={{ background: "#18181b", border: "1px solid #3f3f46", borderRadius: 8, fontSize: 12 }} labelStyle={{ color: "#a1a1aa" }} />
                  <Area type="monotone" dataKey="predicted" stroke={ACCENT} strokeWidth={2} fill="url(#predGrad)" name="Predicted" />
                  <Area type="monotone" dataKey="actual" stroke="#fff" strokeWidth={2.5} fill="url(#actGrad)" connectNulls={false} name="Actual" />
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div className="flex gap-4 text-xs mt-3 justify-center">
              <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full" style={{ background: ACCENT }} /><span className="text-zinc-400">Predicted</span></span>
              <span className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-white" /><span className="text-zinc-400">Actual</span></span>
            </div>
          </Card>

          {/* Predictions */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Forecasts</h2>
          <div className="grid grid-cols-2 gap-3 mb-4">
            <PredictCard label="End of week" weight={eowWeight} delta={-(currentWeight - eowWeight).toFixed(1)} />
            <PredictCard label="End of month" weight={eomWeight} delta={-(currentWeight - eomWeight).toFixed(1)} />
            <PredictCard label="Weekly pace" weight={`−${expectedWeeklyLoss.toFixed(2)} kg`} sub="this week" />
            <PredictCard label="Monthly pace" weight={`−${expectedMonthlyLoss.toFixed(1)} kg`} sub="this month" />
          </div>

          {/* Calories */}
          <Card className="mb-4">
            <div className="flex justify-between items-start mb-3">
              <div>
                <div className="text-zinc-500 text-xs uppercase tracking-wider font-semibold">7-day avg intake</div>
                <div className="text-2xl font-bold text-zinc-100 mono">{avgCal} <span className="text-sm text-zinc-500">kcal</span></div>
              </div>
              <div className="text-right">
                <div className="text-xs text-zinc-500">TDEE</div>
                <div className="text-lg font-bold text-zinc-300 mono">{tdee}</div>
              </div>
            </div>
            <div className="h-28">
              <ResponsiveContainer width="100%" height="100%">
                <BarChart data={last7Cal} margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                  <XAxis dataKey="date" tick={{ fill: "#52525b", fontSize: 9 }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ background: "#18181b", border: "1px solid #3f3f46", borderRadius: 8, fontSize: 12 }} cursor={{ fill: "#27272a" }} />
                  <ReferenceLine y={tdee} stroke="#fb923c" strokeDasharray="3 3" />
                  <Bar dataKey="cal" fill={ACCENT} radius={[4, 4, 0, 0]} />
                </BarChart>
              </ResponsiveContainer>
            </div>
          </Card>

          {/* Insight */}
          <Card>
            <div className="flex items-start gap-3">
              <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0"
                style={{ background: consistent ? "rgba(163,230,53,0.15)" : "rgba(251,146,60,0.15)" }}>
                {consistent
                  ? <Trophy className="w-4 h-4" style={{ color: ACCENT }} />
                  : <Target className="w-4 h-4 text-orange-400" />}
              </div>
              <div>
                <div className="text-zinc-100 font-semibold text-sm">
                  {consistent ? "Workouts are boosting your fat loss." : "Inconsistent training — predictions adjusted down."}
                </div>
                <p className="text-xs text-zinc-500 mt-1 leading-relaxed">
                  {consistent
                    ? "Your TDEE is calculated using a moderate activity multiplier (1.55), which adds ~10% to expected weekly loss."
                    : "Without regular sessions, we use a light activity multiplier (1.375). Hit 4+ workouts a week to unlock the boost."}
                </p>
              </div>
            </div>
          </Card>
        </div>
      );
    }

    const PredictCard = ({ label, weight, delta, sub }) => (
      <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4">
        <div className="text-xs text-zinc-500 uppercase tracking-wider font-semibold">{label}</div>
        <div className="text-xl font-bold text-zinc-100 mono mt-1">{typeof weight === "number" ? `${weight} kg` : weight}</div>
        {delta !== undefined && (
          <div className="text-xs mono mt-0.5" style={{ color: ACCENT }}>{delta} kg</div>
        )}
        {sub && <div className="text-xs text-zinc-600 mt-0.5">{sub}</div>}
      </div>
    );

    // ============ PROFILE SCREEN ============
    function ProfileScreen({ profile, setProfile, measurements, setMeasurements, weights }) {
      const [editing, setEditing] = useState(false);
      const [showMeasure, setShowMeasure] = useState(false);
      const [newM, setNewM] = useState({ chest: 100, waist: 85, arms: 35 });

      const tdee = calcTDEE(profile);
      const bmr = Math.round(calcBMR(profile));

      const lastMeasurement = measurements[measurements.length - 1];

      const saveMeasurement = () => {
        setMeasurements([...measurements, { ...newM, date: todayKey() }]);
        setShowMeasure(false);
      };

      return (
        <div className="px-5 pt-5 fade-in">
          <h1 className="text-2xl font-bold text-zinc-100 mb-5">Profile</h1>

          {/* Avatar + name */}
          <Card className="mb-4 text-center py-6">
            <div className="w-20 h-20 rounded-full mx-auto flex items-center justify-center text-3xl font-bold text-zinc-900 mb-3"
              style={{ background: ACCENT }}>
              {profile.name?.[0]?.toUpperCase() || "U"}
            </div>
            <div className="font-bold text-zinc-100 text-lg">{profile.name}</div>
            <div className="text-xs text-zinc-500 mt-0.5 mono">
              {profile.age}y · {profile.height}cm · {profile.gender}
            </div>
          </Card>

          {/* Body stats */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Body</h2>
          <div className="grid grid-cols-2 gap-3 mb-4">
            <Card>
              <div className="text-xs text-zinc-500">BMR</div>
              <div className="text-xl font-bold text-zinc-100 mono">{bmr}</div>
              <div className="text-xs text-zinc-600">resting kcal</div>
            </Card>
            <Card>
              <div className="text-xs text-zinc-500">TDEE</div>
              <div className="text-xl font-bold text-zinc-100 mono">{tdee}</div>
              <div className="text-xs text-zinc-600">daily burn</div>
            </Card>
          </div>

          {/* Measurements */}
          <Card className="mb-4">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <Ruler className="w-4 h-4 text-zinc-400" />
                <span className="text-zinc-100 font-semibold">Body measurements</span>
              </div>
              <button onClick={() => setShowMeasure(true)}
                className="text-xs text-lime-400 font-semibold flex items-center gap-1">
                <Plus className="w-3 h-3" /> Log
              </button>
            </div>
            {lastMeasurement ? (
              <div className="grid grid-cols-3 gap-3">
                <MeasureBox label="Chest" val={lastMeasurement.chest} />
                <MeasureBox label="Waist" val={lastMeasurement.waist} />
                <MeasureBox label="Arms" val={lastMeasurement.arms} />
              </div>
            ) : (
              <div className="text-center text-zinc-600 text-xs py-2">No measurements yet</div>
            )}
            {lastMeasurement && (
              <div className="text-xs text-zinc-600 mt-3 mono text-center">Last: {fmtDate(lastMeasurement.date)}</div>
            )}
          </Card>

          {/* Settings */}
          <h2 className="text-zinc-500 text-xs uppercase tracking-wider font-semibold mb-3">Settings</h2>
          <div className="bg-zinc-900 border border-zinc-800 rounded-2xl divide-y divide-zinc-800 mb-4">
            <SettingRow icon={Target} label="Goal weight" value={`${profile.goalWeight} kg`} />
            <SettingRow icon={Calendar} label="Duration" value={`${profile.durationDays} days`} />
            <SettingRow icon={Bell} label="Notifications" value="On" />
            <SettingRow icon={Zap} label="No-tracking mode"
              value={profile.noTracking ? "On" : "Off"}
              onClick={() => setProfile({ ...profile, noTracking: !profile.noTracking })} />
          </div>

          {/* Reset */}
          <button onClick={() => {
            if (confirm("Reset all data? This cannot be undone.")) {
              ["ftp:profile", "ftp:weights", "ftp:workouts", "ftp:meals", "ftp:water", "ftp:measurements", "ftp:streak"]
                .forEach(k => window.storage.delete(k));
              location.reload();
            }
          }}
            className="w-full py-3 text-zinc-600 text-xs hover:text-red-400">
            Reset all data
          </button>

          {/* Measurement modal */}
          {showMeasure && (
            <Modal onClose={() => setShowMeasure(false)} title="Log measurements">
              <Field label="Chest (cm)">
                <NumberStepper value={newM.chest} onChange={v => setNewM({ ...newM, chest: v })} min={50} max={200} step={0.5} decimals={1} suffix="cm" />
              </Field>
              <Field label="Waist (cm)">
                <NumberStepper value={newM.waist} onChange={v => setNewM({ ...newM, waist: v })} min={40} max={200} step={0.5} decimals={1} suffix="cm" />
              </Field>
              <Field label="Arms (cm)">
                <NumberStepper value={newM.arms} onChange={v => setNewM({ ...newM, arms: v })} min={20} max={70} step={0.5} decimals={1} suffix="cm" />
              </Field>
              <button onClick={saveMeasurement}
                className="w-full mt-2 py-3.5 rounded-xl font-bold text-zinc-900 flex items-center justify-center gap-2"
                style={{ background: ACCENT }}>
                <Save className="w-4 h-4" /> Save
              </button>
            </Modal>
          )}
        </div>
      );
    }

    const MeasureBox = ({ label, val }) => (
      <div className="bg-zinc-800/50 rounded-xl p-3 text-center">
        <div className="text-xs text-zinc-500 uppercase tracking-wider font-semibold">{label}</div>
        <div className="text-lg font-bold text-zinc-100 mono mt-0.5">{val} <span className="text-xs text-zinc-500">cm</span></div>
      </div>
    );

    const SettingRow = ({ icon: Icon, label, value, onClick }) => (
      <button onClick={onClick} className="w-full flex items-center gap-3 p-4 hover:bg-zinc-800/50 transition text-left">
        <Icon className="w-4 h-4 text-zinc-500" />
        <span className="flex-1 text-sm text-zinc-200">{label}</span>
        <span className="text-sm text-zinc-500 mono">{value}</span>
        <ChevronRight className="w-4 h-4 text-zinc-700" />
      </button>
    );

    // ============ SHARED COMPONENTS ============
    const Card = ({ children, className = "" }) => (
      <div className={`bg-zinc-900 border border-zinc-800 rounded-2xl p-4 ${className}`}>
        {children}
      </div>
    );

    function Modal({ onClose, title, children, fullHeight }) {
      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/70 backdrop-blur-sm sm:items-center"
          onClick={onClose}>
          <div className={`w-full sm:max-w-md bg-zinc-900 border border-zinc-800 rounded-t-3xl sm:rounded-3xl p-5 fade-in ${fullHeight ? "max-h-[85vh]" : ""}`}
            onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-bold text-zinc-100">{title}</h3>
              <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center">
                <X className="w-4 h-4 text-zinc-400" />
              </button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    function BottomNav({ tab, setTab }) {
      const items = [
        { key: "home", icon: Home, label: "Home" },
        { key: "workout", icon: Dumbbell, label: "Train" },
        { key: "nutrition", icon: Apple, label: "Food" },
        { key: "progress", icon: TrendingUp, label: "Progress" },
        { key: "profile", icon: User, label: "Profile" }
      ];
      return (
        <div className="absolute bottom-0 left-0 right-0 bg-zinc-950/95 backdrop-blur-xl border-t border-zinc-800 px-2 pt-2 pb-3">
          <div className="flex justify-around">
            {items.map(({ key, icon: Icon, label }) => (
              <button key={key} onClick={() => setTab(key)}
                className="flex flex-col items-center gap-1 px-3 py-1.5 transition">
                <Icon className="w-5 h-5 transition" style={{ color: tab === key ? ACCENT : "#71717a" }} />
                <span className="text-[10px] font-semibold tracking-wide" style={{ color: tab === key ? ACCENT : "#71717a" }}>{label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }


    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => { const el = document.getElementById('loading'); if (el) el.remove(); }, 400);
    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
